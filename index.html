<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerraMax | Inteligencia de Compras</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']},colors:{dark:'#0f172a',card:'#1e293b',primary:'#3b82f6',accent:'#f59e0b'}}}}</script>
    <style>
        body{font-family:'Inter',sans-serif;background:#0f172a;color:#f8fafc}
        .glass{background:rgba(30,41,59,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1)}
        .cs::-webkit-scrollbar{width:6px;height:6px} .cs::-webkit-scrollbar-track{background:#1e293b} .cs::-webkit-scrollbar-thumb{background:#475569;border-radius:4px}
        .rth{resize:horizontal;overflow:auto;position:relative;min-width:50px}
        .rth::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;cursor:col-resize;background:rgba(255,255,255,0.08)}
        .chip{display:inline-flex;align-items:center;padding:2px 12px;border-radius:999px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
        .ca{background:#3b82f6;color:#fff} .ci{background:#1e293b;color:#94a3b8;border:1px solid #334155} .ci:hover{border-color:#3b82f6;color:#93c5fd}
        .fpill{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;background:#1e3a5f;border:1px solid #3b82f6;border-radius:999px;font-size:11px;color:#93c5fd}
        tr.grp-hdr{background:rgba(59,130,246,0.1);border-left:3px solid #3b82f6;cursor:pointer}
        tr.grp-hdr:hover{background:rgba(59,130,246,0.18)}
        tr.grp-hdr td{padding:6px 12px;font-weight:700;color:#93c5fd;font-size:11px;letter-spacing:.04em}
        .sort-th{cursor:pointer;user-select:none} .sort-th:hover{background:rgba(255,255,255,0.04)}
    </style>
</head>
<body class="min-h-screen" x-data="app()">

<script type="module">
    import{initializeApp}from"https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import{getAuth,signInWithPopup,GoogleAuthProvider,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    import{getFirestore,collection,doc,setDoc,getDocs,writeBatch}from"https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
    const a=initializeApp({apiKey:"AIzaSyAa57ppjWFUcEdniw9WScABHssyACP3x3k",authDomain:"compras-herramax.firebaseapp.com",projectId:"compras-herramax",storageBucket:"compras-herramax.firebasestorage.app",messagingSenderId:"558573642669",appId:"1:558573642669:web:f967def7deb883fa16b724"});
    window.fbA={auth:getAuth(a),signInWithPopup,GoogleAuthProvider,onAuthStateChanged,signOut};
    window.fbD={db:getFirestore(a),collection,doc,setDoc,getDocs,writeBatch};
</script>

<!-- NAV -->
<nav class="glass sticky top-0 z-50 px-5 py-3 flex justify-between items-center shadow-xl">
    <div class="flex items-center gap-3">
        <div class="h-9 w-9 rounded-lg bg-gradient-to-br from-primary to-blue-300 flex items-center justify-center font-black text-white shadow-[0_0_18px_rgba(59,130,246,0.6)]">HM</div>
        <span class="text-lg font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">Purchasing Intelligence</span>
    </div>
    <div class="flex items-center gap-3">
        <template x-if="!user"><button @click="login()" class="px-4 py-2 bg-white text-slate-800 hover:bg-slate-100 rounded-lg text-sm font-bold">🔑 Ingresar con Google</button></template>
        <template x-if="user">
            <div class="flex items-center gap-3">
                <img :src="user.photoURL" class="w-8 h-8 rounded-full border-2 border-primary">
                <span class="text-xs text-slate-400 hidden md:block" x-text="user.email"></span>
                <button @click="wipeCloud()" class="px-3 py-2 bg-red-900 hover:bg-red-800 text-white rounded-lg text-xs font-bold transition-all border border-red-700" title="Peligro: Borra Firebase">🔥 BD</button>
                <button @click="clearSess()" class="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-bold transition-all border border-slate-700">🧹 Limpiar Sesión</button>
                <button @click="syncToCloud()" :class="syncing?'animate-pulse':''" class="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs font-bold transition-all">☁️ Sincronizar</button>
                <button @click="exportOdooPOs()" class="px-4 py-2 bg-gradient-to-r from-blue-600 to-primary rounded-lg text-sm font-bold shadow-[0_0_14px_rgba(59,130,246,0.4)]">🚀 Exportar POs</button>
                <button @click="logout()" class="text-xs text-red-400 hover:text-red-300">Salir</button>
            </div>
        </template>
    </div>
</nav>

<main class="p-5 max-w-[1500px] mx-auto space-y-4">
    <div x-show="!user" class="glass p-10 rounded-2xl border border-accent/50 text-center mt-10">
        <div class="text-5xl mb-4">🔒</div>
        <h2 class="text-2xl font-bold mb-2">Acceso Restringido</h2>
        <p class="text-slate-400">Inicia sesión con tu cuenta de Google autorizada.</p>
    </div>

    <template x-if="user">
    <div>
        <!-- TABS -->
        <div class="flex gap-2 mb-4 bg-slate-800/60 p-1 rounded-xl w-fit">
            <button @click="setTab('proc')" class="px-5 py-2 rounded-lg text-sm font-bold transition-all" :class="tab==='proc'?'bg-primary text-white shadow-lg':'text-slate-400 hover:text-white'">📥 Procesamiento (XML / CSV)</button>
            <button @click="setTab('dash')" class="px-5 py-2 rounded-lg text-sm font-bold transition-all" :class="tab==='dash'?'bg-accent text-slate-900 shadow-lg':'text-slate-400 hover:text-white'">🗄️ Master Histórico & BI</button>
            <button @click="setTab('labels')" class="px-5 py-2 rounded-lg text-sm font-bold transition-all" :class="tab==='labels'?'bg-green-600 text-white shadow-lg':'text-slate-400 hover:text-white'">🏷️ Generar Etiquetas</button>
        </div>

        <!-- ======= PROCESAMIENTO ======= -->
        <div x-show="tab==='proc'" x-transition class="space-y-3">
            <!-- Upload zone -->
            <div class="glass p-5 rounded-2xl border border-dashed border-blue-500/40 text-center relative overflow-hidden transition-all"
                 @dragover.prevent="drag=true" @dragleave.prevent="drag=false" @drop.prevent="onDrop($event)"
                 :class="drag?'border-primary bg-primary/10':''">
                <p class="font-bold mb-1 text-lg">Lanza tus Facturas Aquí 📄📦</p>
                <p class="text-xs text-slate-400 mb-3">Arrastra archivos <b>.XML</b> (CFDI SAT) o <b>.CSV</b></p>
                <label class="cursor-pointer px-5 py-2 bg-primary hover:bg-blue-500 rounded-lg font-bold text-sm inline-block">
                    📥 Seleccionar Archivos
                    <input type="file" multiple accept=".csv,.xml" class="hidden" @change="onFileSel">
                </label>
            </div>

            <!-- KPIs -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="glass p-4 rounded-xl"><p class="text-xs text-slate-400">Gasto Histórico Nube</p><p class="text-2xl font-black" x-text="'$'+totalSpent.toLocaleString('en-US',{minimumFractionDigits:2})"></p></div>
                <div class="glass p-4 rounded-xl"><p class="text-xs text-slate-400">Artículos</p><p class="text-2xl font-black text-blue-400" x-text="items.length"></p></div>
                <div class="glass p-4 rounded-xl"><p class="text-xs text-slate-400">Facturas Únicas</p><p class="text-2xl font-black text-accent" x-text="uniqueUUIDs.length"></p></div>
                <div class="glass p-4 rounded-xl"><p class="text-xs text-slate-400 mb-1">Fechas Sesión</p><p class="text-sm font-bold text-green-400" x-text="sessDatesTxt"></p></div>
            </div>

            <!-- Filter bar -->
            <div class="glass rounded-xl border border-slate-700/40 p-3 space-y-2">
                <div class="flex flex-wrap items-center gap-2">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wide shrink-0">Filtros</span>
                    <input type="text" x-model="q" placeholder="🔍 SKU, descripción, categoría, proveedor..." class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:border-primary flex-1 min-w-[220px]">

                    <span class="text-xs text-slate-500 shrink-0">Mostrar:</span>
                    <button @click="fCat=''"        class="chip" :class="fCat===''?'ca':'ci'">Todos</button>
                    <button @click="fCat='SIN'"     class="chip" :class="fCat==='SIN'?'bg-red-600 text-white chip':'ci'">❌ Sin Asignar</button>
                    <button @click="fCat='OK'"      class="chip" :class="fCat==='OK'?'bg-green-600 text-white chip':'ci'">✅ Clasificados</button>

                    <span class="text-xs text-slate-500 shrink-0">Proveedor:</span>
                    <select x-model="fProv" class="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs focus:outline-none focus:border-primary">
                        <option value="">Todos</option>
                        <template x-for="p in allProvs" :key="p"><option :value="p" x-text="p"></option></template>
                    </select>

                    <span class="text-xs text-slate-500 shrink-0">Agrupa:</span>
                    <template x-for="g in ['Ninguno','Categoria','Proveedor','Fecha']" :key="g">
                        <button @click="grpBy=g;collapsedGroups={}" class="chip" :class="grpBy===g?'ca':'ci'" x-text="g"></button>
                    </template>

                    <button x-show="q||fCat||fProv" @click="q='';fCat='';fProv=''" class="text-xs text-red-400 hover:text-red-300 underline ml-1">limpiar</button>
                </div>
                <!-- Active pills -->
                <div x-show="q||fCat||fProv" class="flex flex-wrap gap-2 pt-1">
                    <div x-show="q" class="fpill">🔍 "<span x-text="q"></span>" <button @click="q=''" class="ml-1 hover:text-white">✕</button></div>
                    <div x-show="fCat==='SIN'" class="fpill !border-red-500 !text-red-300">❌ Sin Asignar <button @click="fCat=''" class="ml-1 hover:text-white">✕</button></div>
                    <div x-show="fCat==='OK'" class="fpill !border-green-500 !text-green-300">✅ Clasificados <button @click="fCat=''" class="ml-1 hover:text-white">✕</button></div>
                    <div x-show="fProv" class="fpill">📦 <span x-text="fProv"></span> <button @click="fProv=''" class="ml-1 hover:text-white">✕</button></div>
                </div>
            </div>

            <!-- Count bar -->
            <div class="flex justify-between items-center text-xs text-slate-500 px-1">
                <div class="flex items-center gap-3">
                    <span>Mostrando <b class="text-slate-300" x-text="filteredItems.length"></b> registros</span>
                    <span>Subtotal: <b class="text-blue-300" x-text="'$'+filteredSubtotal.toLocaleString('en-US',{minimumFractionDigits:2})"></b></span>
                </div>
                <div class="flex items-center gap-2">
                    <button @click="showHistory = !showHistory" class="px-3 py-1 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 rounded transition-all">
                        <span x-text="showHistory ? '👁️ Ocultar Histórico' : '📂 Cargar Histórico Nube'"></span>
                    </button>
                    <button @click="wipeCloud()" class="px-3 py-1 bg-red-950/20 hover:bg-red-900 border border-red-900/50 text-red-400 rounded transition-all">🔥 BD</button>
                </div>
            </div>

            <!-- BULK ACTIONS BAR -->
            <div class="glass border-x border-b border-slate-700/30 bg-blue-900/20 px-4 py-2 flex items-center gap-4 transition-all" x-show="selU.length > 0" x-transition>
                <div class="flex items-center gap-2 border-r border-slate-700/50 pr-4">
                    <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Acción Masiva</span>
                    <span class="px-2 py-0.5 bg-blue-600/20 text-blue-400 rounded text-[10px] font-bold border border-blue-500/30"><span x-text="selU.length"></span> facturas</span>
                </div>
                
                <div class="flex items-center gap-2">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Tipo:</span>
                    <select @change="bulkApplyType($event.target.value); $event.target.value=''" class="bg-slate-900 border border-slate-700 rounded text-[10px] px-2 py-1 text-slate-300 focus:border-blue-500 outline-none">
                        <option value="">-- Cambiar a --</option>
                        <option value="Almacenable">📦 Almacenable</option>
                        <option value="Servicio">⚙️ Servicio/Gasto</option>
                        <option value="Regalo">🎁 Regalo/Promo</option>
                    </select>
                </div>

                <div class="flex items-center gap-2">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Categoría:</span>
                    <select @change="bulkApplyCat($event.target.value); $event.target.value=''" class="bg-slate-900 border border-slate-700 rounded text-[10px] px-2 py-1 text-slate-300 focus:border-blue-500 outline-none max-w-[180px]">
                        <option value="">-- Cambiar a --</option>
                        <template x-for="c in odooCats" :key="c"><option :value="c" x-text="c"></option></template>
                    </select>
                </div>
                
                <div class="ml-auto flex gap-2">
                     <button @click="delInvoices()" class="px-3 py-1 bg-red-900/80 hover:bg-red-700 text-white rounded text-[10px] font-bold transition-all shadow-lg border border-red-600/50">🗑️ Borrar de Mesa</button>
                </div>
            </div>
            
            <!-- DATA TABLE -->
            <div class="glass rounded-xl border border-slate-700/50 flex flex-col" style="height:560px">
                <div x-show="!showHistory && sessUUIDs.length === 0" class="flex-1 flex flex-col items-center justify-center text-slate-500">
                    <div class="text-4xl mb-3">🧹</div>
                    <p class="font-bold">Mesa de Trabajo Limpia</p>
                    <p class="text-xs">Arrastra facturas para comenzar o haz clic en "Cargar Histórico Nube".</p>
                </div>
                <div x-show="showHistory || sessUUIDs.length > 0" class="overflow-y-auto cs flex-1">
                    <table class="w-full text-left text-xs">
                        <thead class="sticky top-0 bg-slate-800/95 backdrop-blur text-slate-300 z-10">
                            <tr>
                                <th class="px-3 py-3 w-10 text-center">
                                    <input type="checkbox" :checked="selU.length === uniqueUUIDs.length && uniqueUUIDs.length > 0" 
                                           @change="$el.checked ? (selU = [...uniqueUUIDs]) : (selU = [])"
                                           class="accent-primary w-4 h-4 cursor-pointer">
                                </th>
                                <th class="px-3 py-3 text-slate-400 font-normal">Factura (5)</th>
                                <th class="px-2 py-3">
                                    <div class="resize-x overflow-auto cs min-w-[60px] w-[80px] sort-th" @click="sBy('SKU')">SKU <span x-show="sc==='SKU'" x-text="sa?'🔼':'🔽'"></span></div>
                                </th>
                                <th class="px-2 py-3">
                                    <div class="resize-x overflow-auto cs min-w-[150px] w-[220px] sort-th" @click="sBy('Producto')">Descripción <span x-show="sc==='Producto'" x-text="sa?'🔼':'🔽'"></span></div>
                                </th>
                                <th class="px-2 py-3">
                                    <div class="resize-x overflow-auto cs min-w-[100px] w-[110px] sort-th" @click="sBy('TipoOdoo')">Tipo <span x-show="sc==='TipoOdoo'" x-text="sa?'🔼':'🔽'"></span></div>
                                </th>
                                <th class="px-2 py-3">
                                    <div class="resize-x overflow-auto cs min-w-[120px] w-[140px] sort-th" @click="sBy('Categoria')">Categoría Odoo <span x-show="sc==='Categoria'" x-text="sa?'🔼':'🔽'"></span></div>
                                </th>
                                <th class="px-2 py-3 text-right">
                                    <div class="sort-th" @click="sBy('Cantidad')">Cant <span x-show="sc==='Cantidad'" x-text="sa?'🔼':'🔽'"></span></div>
                                </th>
                                <th class="px-2 py-3 text-right">
                                    <div class="sort-th" @click="sBy('Costo_Unitario')">Unit $ <span x-show="sc==='Costo_Unitario'" x-text="sa?'🔼':'🔽'"></span></div>
                                </th>
                                <th class="px-2 py-3 text-right">
                                    <div class="sort-th" @click="sBy('Subtotal_Total')">Subtotal <span x-show="sc==='Subtotal_Total'" x-text="sa?'🔼':'🔽'"></span></div>
                                </th>
                                <th class="px-2 py-3">
                                    <div class="resize-x overflow-auto cs min-w-[100px] w-[130px] sort-th" @click="sBy('Proveedor')">Proveedor <span x-show="sc==='Proveedor'" x-text="sa?'🔼':'🔽'"></span></div>
                                </th>
                                <th class="px-2 py-3 text-slate-400 font-normal">Timbrado</th>
                                <th class="px-2 py-3 sort-th" @click="sBy('Fecha')">Emisión <span x-show="sc==='Fecha'" x-text="sa?'🔼':'🔽'"></span></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-700/30">
                            <template x-for="row in procRows" :key="row._id">
                                <!-- SINGLE TR: group header OR data row -->
                                <tr
                                    x-show="row._grp || !collapsedGroups[row._grpKey]"
                                    :class="row._grp ? 'grp-hdr' : (sessUUIDs.includes(row.UUID_Factura)?'bg-blue-950/20 hover:bg-slate-700/25 transition-colors':'hover:bg-slate-700/25 transition-colors')"
                                    @click="row._grp && toggleGroup(row._grpKey)">
                                    <!-- Group header cell -->
                                    <td x-show="row._grp" colspan="13">
                                        <span x-text="collapsedGroups[row._grpKey]?'▶':'▼'"></span>
                                        <span class="ml-2" x-text="row._grpLabel"></span>
                                        <span class="ml-2 font-normal text-slate-400">(<span x-text="row._grpCount"></span> artículos &middot; $<span x-text="row._grpSum.toLocaleString('en-US',{minimumFractionDigits:2})"></span>)</span>
                                        <div class="ml-4 inline-flex items-center space-x-2" @click.stop v-show="grpBy==='UUID_Factura'">
                                            <span class="font-normal text-xs text-slate-400">Marcar todo como:</span>
                                            <select @change="applyBulkType(row._grpKey, $event.target.value)" class="bg-slate-900 border border-slate-600 rounded px-1 py-0.5 text-xs text-slate-300">
                                                <option value="" disabled selected>-- Elegir Tipo --</option>
                                                <option value="Almacenable">Almacenable (Inventario)</option>
                                                <option value="Servicio">Servicio/Gasto Operativo</option>
                                                <option value="Regalo">Regalo</option>
                                            </select>
                                        </div>
                                    </td>
                                    <!-- Selector -->
                                    <td x-show="!row._grp" class="px-3 py-1.5 text-center">
                                        <input type="checkbox" :value="row.UUID_Factura" x-model="selU" class="accent-red-500 w-4 h-4 cursor-pointer">
                                    </td>
                                    <!-- UUID 5 -->
                                    <td x-show="!row._grp" class="px-3 py-1.5 text-[10px] font-mono text-slate-500" x-text="(row.UUID_Factura||'').slice(-5)"></td>
                                    <!-- Data cells -->
                                    <td x-show="!row._grp" class="px-3 py-1.5 font-mono font-bold text-accent" x-text="row.SKU||'-'"></td>
                                    <td x-show="!row._grp" class="px-3 py-1.5" :title="row.Producto">
                                        <div class="resize-x overflow-auto cs whitespace-nowrap min-w-[150px] w-[220px] max-w-[600px] text-xs py-1" x-text="row.Producto"></div>
                                    </td>
                                    <td x-show="!row._grp" class="px-3 py-1.5">
                                        <select x-model="row.TipoOdoo" @change="dirty(row); if(selU.includes(row.UUID_Factura)) bulkApplyType(row.TipoOdoo)" class="bg-slate-900 border border-slate-600 rounded px-1 text-xs w-24 focus:border-primary text-slate-300">
                                            <option value="Almacenable">📦 Almacen.</option>
                                            <option value="Servicio">⚙️ Servicio</option>
                                            <option value="Regalo">🎁 Regalo</option>
                                        </select>
                                    </td>
                                    <td x-show="!row._grp" class="px-3 py-1.5">
                                        <select x-model="row.Categoria" @change="dirty(row); if(selU.includes(row.UUID_Factura)) bulkApplyCat(row.Categoria)"
                                            class="bg-slate-900 border rounded px-1.5 py-0.5 text-xs font-semibold w-36 focus:outline-none focus:border-primary"
                                            :class="row.Categoria&&row.Categoria!=='Sin Asignar'?'border-green-700 text-green-400':'border-red-800 text-red-400'">
                                            <option>Sin Asignar</option>
                                            <template x-for="c in odooCats" :key="c"><option :value="c" x-text="c"></option></template>
                                        </select>
                                    </td>
                                    <td x-show="!row._grp" class="px-3 py-1.5 text-right" x-text="row.Cantidad"></td>
                                    <td x-show="!row._grp" class="px-3 py-1.5 text-right font-mono" x-text="'$'+(parseFloat(row.Costo_Unitario)||0).toFixed(2)"></td>
                                    <td x-show="!row._grp" class="px-3 py-1.5 text-right font-mono font-bold text-blue-300" x-text="'$'+(parseFloat(row.Subtotal_Total)||0).toFixed(2)"></td>
                                    <td x-show="!row._grp" class="px-3 py-1.5 text-slate-500" :title="row.Proveedor">
                                        <div class="resize-x overflow-auto cs whitespace-nowrap min-w-[100px] w-[130px] max-w-[300px] text-xs py-1" x-text="row.Proveedor"></div>
                                    </td>
                                    <td x-show="!row._grp" class="px-3 py-1.5 text-slate-500 text-[10px]" x-text="row.Fecha_Timbrado || '-'"></td>
                                    <td x-show="!row._grp" class="px-3 py-1.5 text-slate-500" x-text="row.Fecha"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ======= DASHBOARD ======= -->
        <div x-show="tab==='dash'" x-transition style="display:none" class="space-y-4">

            <!-- Dashboard filter bar -->
            <div class="glass rounded-xl border border-slate-700/40 p-3 flex flex-wrap items-center gap-3">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wide shrink-0">Filtros Dashboard:</span>
                <select x-model="dProv" @change="applyDash('Proveedor',dProv)" class="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs focus:outline-none focus:border-accent">
                    <option value="">Todos los proveedores</option>
                    <template x-for="p in allProvs" :key="p"><option :value="p" x-text="p"></option></template>
                </select>
                <select x-model="dCat" @change="applyDash('Categoría',dCat)" class="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs focus:outline-none focus:border-accent">
                    <option value="">Todas las categorías</option>
                    <template x-for="c in odooCats" :key="c"><option :value="c" x-text="c"></option></template>
                </select>
                <select x-model="dMes" @change="applyDash('Mes',dMes)" class="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs focus:outline-none focus:border-accent">
                    <option value="">Todos los meses</option>
                    <template x-for="m in allMeses" :key="m"><option :value="m" x-text="m"></option></template>
                </select>
                <div x-show="dFilt" class="fpill">
                    <span x-text="dFilt?dFilt.t+': '+dFilt.v:''"></span>
                    <button @click="clearDash()" class="ml-1 hover:text-white">✕ Limpiar</button>
                </div>
            </div>

            <!-- Charts -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <div class="glass p-4 rounded-xl border border-slate-700/50">
                    <h3 class="text-sm font-bold text-center mb-2 text-slate-300">Gasto por Categoría <span class="text-slate-500 text-xs">(click → filtrar)</span></h3>
                    <div style="height:220px"><canvas id="catChart"></canvas></div>
                </div>
                <div class="glass p-4 rounded-xl border border-slate-700/50">
                    <h3 class="text-sm font-bold text-center mb-2 text-slate-300">Gasto por Mes <span class="text-slate-500 text-xs">(click → filtrar)</span></h3>
                    <div style="height:220px"><canvas id="monthChart"></canvas></div>
                </div>
                <div class="glass p-4 rounded-xl border border-slate-700/50">
                    <h3 class="text-sm font-bold text-center mb-2 text-slate-300">Top Proveedores <span class="text-slate-500 text-xs">(click → filtrar)</span></h3>
                    <div style="height:220px"><canvas id="provChart"></canvas></div>
                </div>
            </div>

            <!-- Flex / Drill-down table -->
            <div class="glass rounded-xl border border-slate-700/50 p-4 space-y-3">
                <div class="flex flex-wrap items-center justify-between gap-3">
                    <div>
                        <h3 class="font-bold text-white">📊 <span x-text="dFilt?dFilt.t+': '+dFilt.v:'Consolidado General'"></span></h3>
                        <p class="text-xs text-slate-400">Total vista: <b class="text-green-400" x-text="'$'+dFlexSum.toLocaleString('en-US',{minimumFractionDigits:2})"></b>
                            &nbsp;·&nbsp;<b class="text-slate-300" x-text="dFlexItems.length"></b> artículos</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs text-slate-500 shrink-0">Agrupar:</span>
                        <template x-for="g in ['Ninguno','Categoria','Proveedor','Fecha']" :key="g">
                            <button @click="dGrp=g;dCollapsed={}" class="chip" :class="dGrp===g?'bg-accent text-slate-900':'ci'" x-text="g"></button>
                        </template>
                        <button @click="dlFlex()" class="px-4 py-1.5 bg-accent hover:bg-yellow-500 text-slate-900 font-bold rounded text-xs shadow shadow-accent/40 shrink-0">📥 Descargar CSV</button>
                    </div>
                </div>

                <!-- Flex sort + search -->
                <div class="flex gap-2">
                    <input type="text" x-model="dQ" placeholder="🔍 Buscar en vista..." class="bg-slate-900 border border-slate-600 rounded px-3 py-1.5 text-xs flex-1 focus:outline-none focus:border-accent">
                </div>

                <!-- Flex table -->
                <div class="overflow-y-auto cs rounded-lg" style="max-height:400px">
                    <table class="w-full text-xs text-left">
                        <thead class="sticky top-0 bg-slate-800/95 text-accent font-bold z-10">
                            <tr>
                                <th class="px-3 py-2 sort-th" @click="dsBy('Fecha')">Fecha <span x-show="dsc==='Fecha'" x-text="dsa?'🔼':'🔽'"></span></th>
                                <th class="px-3 py-2 sort-th" @click="dsBy('SKU')">SKU <span x-show="dsc==='SKU'" x-text="dsa?'🔼':'🔽'"></span></th>
                                <th class="px-3 py-2 sort-th" @click="dsBy('Producto')">Producto <span x-show="dsc==='Producto'" x-text="dsa?'🔼':'🔽'"></span></th>
                                <th class="px-3 py-2 sort-th" @click="dsBy('Categoria')">Categoría <span x-show="dsc==='Categoria'" x-text="dsa?'🔼':'🔽'"></span></th>
                                <th class="px-3 py-2 sort-th" @click="dsBy('Proveedor')">Proveedor <span x-show="dsc==='Proveedor'" x-text="dsa?'🔼':'🔽'"></span></th>
                                <th class="px-3 py-2 sort-th text-right" @click="dsBy('Subtotal_Total')">Subtotal <span x-show="dsc==='Subtotal_Total'" x-text="dsa?'🔼':'🔽'"></span></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-700/30">
                            <template x-for="row in dashRows" :key="row._id">
                                <!-- SINGLE TR: group header OR data row -->
                                <tr
                                    x-show="row._grp || !dCollapsed[row._grpKey]"
                                    :class="row._grp ? 'grp-hdr' : 'hover:bg-slate-700/25 text-slate-300'"
                                    @click="row._grp && toggleDash(row._grpKey)">
                                    <!-- Group header cell -->
                                    <td x-show="row._grp" colspan="6">
                                        <span x-text="dCollapsed[row._grpKey]?'▶':'▼'"></span>
                                        <span class="ml-2" x-text="row._grpLabel"></span>
                                        <span class="ml-2 font-normal text-slate-400">(<span x-text="row._grpCount"></span> · $<span x-text="row._grpSum.toLocaleString('en-US',{minimumFractionDigits:2})"></span>)</span>
                                    </td>
                                    <!-- Data cells -->
                                    <td x-show="!row._grp" class="px-3 py-1.5" x-text="row.Fecha"></td>
                                    <td x-show="!row._grp" class="px-3 py-1.5 font-mono text-slate-400" x-text="row.SKU"></td>
                                    <td x-show="!row._grp" class="px-3 py-1.5 max-w-[200px] truncate" :title="row.Producto" x-text="row.Producto"></td>
                                    <td x-show="!row._grp" class="px-3 py-1.5 text-green-300" x-text="row.Categoria"></td>
                                    <td x-show="!row._grp" class="px-3 py-1.5 max-w-[140px] truncate" x-text="row.Proveedor"></td>
                                    <td x-show="!row._grp" class="px-3 py-1.5 text-right font-bold text-white" x-text="'$'+(parseFloat(row.Subtotal_Total)||0).toFixed(2)"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ======= LABELS GENERATOR ======= -->
        <div x-show="tab==='labels'" x-transition class="space-y-4">
            <div class="glass p-5 rounded-2xl border border-green-500/30 flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h3 class="text-xl font-bold text-green-400">🏷️ Generador de Etiquetas</h3>
                    <p class="text-xs text-slate-400">Se generarán etiquetas para los <b x-text="filteredItems.length"></b> artículos en la mesa.</p>
                </div>
                
                <div class="flex items-center gap-4 bg-slate-900/50 p-2 rounded-xl border border-slate-700">
                    <span class="text-xs font-bold text-slate-500 uppercase">Tienda Destino:</span>
                    <div class="flex gap-1">
                        <button @click="labelStore='Ele45'" :class="labelStore==='Ele45'?'bg-blue-600 text-white':'bg-slate-800 text-slate-500'" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all">Electrica 45</button>
                        <button @click="labelStore='Fer41'" :class="labelStore==='Fer41'?'bg-orange-600 text-white':'bg-slate-800 text-slate-500'" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all">Ferreteria 41</button>
                    </div>
                </div>

                <button @click="printLabels()" class="px-6 py-2 bg-green-600 hover:bg-green-500 text-white rounded-xl font-bold shadow-lg transition-all">
                    🖨️ Imprimir PDF
                </button>
            </div>

            <!-- Labels Preview -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                <template x-for="item in filteredItems" :key="item.FB_ID">
                    <div class="bg-white text-black p-3 rounded shadow-sm flex flex-col justify-between border-2 border-slate-200 aspect-[5/3] overflow-hidden">
                        <div>
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[14px] font-black leading-none" x-text="item.SKU || '---'"></span>
                                <span class="text-[9px] bg-slate-100 px-1 rounded font-bold border border-slate-300" x-text="labelStore"></span>
                            </div>
                            <div class="text-[10px] uppercase font-bold leading-tight mb-1" x-text="item.Producto"></div>
                        </div>
                        <div class="flex justify-between items-end">
                            <span class="text-[8px] italic text-slate-500 truncate" x-text="item.Categoria"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

    </div> <!-- closes div at line 69 -->
    </template>
</main>

<script>
document.addEventListener('alpine:init',()=>{
Alpine.data('app',()=>({
    // Auth & data
    user:null, items:[], sessUUIDs:[], showHistory:false, selU:[],
    // Processing filters
    q:'', fCat:'', fProv:'',
    grpBy:'Ninguno', collapsedGroups:{},
    sc:'Fecha', sa:false,
    drag:false, syncing:false, dirtySet:new Set(),
    // Dashboard
    tab:'proc',
    dFilt:null, dProv:'', dCat:'', dMes:'',
    dGrp:'Ninguno', dCollapsed:{},
    dsc:'Subtotal_Total', dsa:false, dQ:'',
    labelStore:'Ele45',
    odooSku:{}, odooName:{}, odooCats:[],
    pnlList: [
        'Gastos de Administración', 
        'Publicidad y Propaganda', 
        'Software, Membresías y Suscripciones', 
        'Servicios de Mantenimiento de Oficinas', 
        'Papelería y Suministros de Oficina', 
        'Honorarios Profesionales', 
        'Teléfono e Internet',
        'Electricidad',
        'Agua',
        'Gastos de viaje y Viáticos',
        'Mobiliario y Equipo de Oficina',
        'Limpieza',
        'Seguros',
        'Otros gastos generales'
    ],
    // Charts registry
    charts:{},

    // ---------- COMPUTED ----------
    get totalSpent(){ return this.items.reduce((s,i)=>s+(parseFloat(i.Subtotal_Total)||0),0); },
    get uniqueUUIDs(){ return [...new Set(this.items.map(i=>i.UUID_Factura).filter(Boolean))]; },
    get sessDatesTxt(){
        const d=[...new Set(this.items.filter(i=>this.sessUUIDs.includes(i.UUID_Factura)).map(i=>i.Fecha))].filter(Boolean);
        return d.length?d.join(' | '):'Todo sincronizado ✔️';
    },
    get allProvs(){ return [...new Set(this.items.map(i=>i.Proveedor).filter(Boolean))].sort(); },
    get allMeses(){ return [...new Set(this.items.map(i=>(i.Fecha||'').substring(0,7)).filter(Boolean))].sort(); },

    // Filtered + sorted items
    get filteredItems(){
        let r=this.items;
        if(!this.showHistory) r=r.filter(i=>this.sessUUIDs.includes(i.UUID_Factura));
        const lq=this.q.toLowerCase();
        if(lq) r=r.filter(i=>[i.Producto,i.SKU,i.Categoria,i.Proveedor].some(v=>v&&String(v).toLowerCase().includes(lq)));
        if(this.fCat==='SIN') r=r.filter(i=>!i.Categoria||i.Categoria==='Sin Asignar');
        else if(this.fCat==='OK') r=r.filter(i=>i.Categoria&&i.Categoria!=='Sin Asignar');
        if(this.fProv) r=r.filter(i=>i.Proveedor===this.fProv);
        const num=['Cantidad','Costo_Unitario','Subtotal_Total'];
        const col=this.sc;
        return[...r].sort((a,b)=>{
            let va=a[col]||'',vb=b[col]||'';
            if(num.includes(col)){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
            else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}
            return(va<vb?-1:va>vb?1:0)*(this.sa?1:-1);
        });
    },
    get filteredSubtotal(){ return this.filteredItems.reduce((s,i)=>s+(parseFloat(i.Subtotal_Total)||0),0); },

    // Grouped rows for processing table
    get procRows(){
        const items = this.filteredItems;
        if(this.grpBy==='Ninguno'){
            // Flat list, each row gets _id and _grpKey='' so x-show="!collapsedGroups['']" is always true
            return items.map((item,i)=>({...item, _grp:false, _grpKey:'', _id:'r_'+i}));
        }
        const key=this.grpBy;
        const groups={};
        items.forEach(item=>{
            const gk=item[key]||'(Sin valor)';
            if(!groups[gk]) groups[gk]=[];
            groups[gk].push(item);
        });
        const rows=[];
        Object.keys(groups).sort().forEach(gk=>{
            const gItems=groups[gk];
            const gSum=gItems.reduce((s,i)=>s+(parseFloat(i.Subtotal_Total)||0),0);
            rows.push({_grp:true,_grpKey:gk,_grpLabel:gk,_grpCount:gItems.length,_grpSum:gSum,_id:'g_'+gk});
            gItems.forEach((item,i)=>rows.push({...item,_grp:false,_grpKey:gk,_id:'d_'+gk+'_'+i}));
        });
        return rows;
    },

    toggleGroup(key){ this.collapsedGroups={...this.collapsedGroups,[key]:!this.collapsedGroups[key]}; },
    toggleDash(key){ this.dCollapsed={...this.dCollapsed,[key]:!this.dCollapsed[key]}; },

    // Dashboard flex items
    get dFlexItems(){
        let r=this.items;
        if(this.dFilt){
            if(this.dFilt.t==='Proveedor') r=r.filter(i=>i.Proveedor===this.dFilt.v);
            else if(this.dFilt.t==='Categoría') r=r.filter(i=>i.Categoria===this.dFilt.v);
            else if(this.dFilt.t==='Mes') r=r.filter(i=>(i.Fecha||'').substring(0,7)===this.dFilt.v);
        }
        const lq=this.dQ.toLowerCase();
        if(lq) r=r.filter(i=>[i.Producto,i.SKU,i.Categoria,i.Proveedor].some(v=>v&&String(v).toLowerCase().includes(lq)));
        const num=['Subtotal_Total'];
        const col=this.dsc;
        return[...r].sort((a,b)=>{
            let va=a[col]||'',vb=b[col]||'';
            if(num.includes(col)){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
            else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}
            return(va<vb?-1:va>vb?1:0)*(this.dsa?1:-1);
        });
    },
    get dFlexSum(){ return this.dFlexItems.reduce((s,i)=>s+(parseFloat(i.Subtotal_Total)||0),0); },
    get dashRows(){
        const items=this.dFlexItems;
        if(this.dGrp==='Ninguno') return items.map((item,i)=>({...item,_grp:false,_grpKey:'',_id:'dr_'+i}));
        const key=this.dGrp;
        const groups={};
        items.forEach(item=>{ const gk=item[key]||'(Sin valor)'; if(!groups[gk]) groups[gk]=[]; groups[gk].push(item); });
        const rows=[];
        Object.keys(groups).sort().forEach(gk=>{
            const gItems=groups[gk];
            const gSum=gItems.reduce((s,i)=>s+(parseFloat(i.Subtotal_Total)||0),0);
            rows.push({_grp:true,_grpKey:gk,_grpLabel:gk,_grpCount:gItems.length,_grpSum:gSum,_id:'dg_'+gk});
            gItems.forEach((item,i)=>rows.push({...item,_grp:false,_grpKey:gk,_id:'dd_'+gk+'_'+i}));
        });
        return rows;
    },

    // ---------- INIT ----------
    init(){
        fetch('./enhanced_cats.json').then(r=>r.json()).then(data=>{
            this.odooSku=data.sku_map||{};
            this.odooName=data.name_map||{};
            const allCats=[...new Set([...Object.values(this.odooSku),...Object.values(this.odooName), ...this.pnlList])];
            this.odooCats=allCats.filter(c=>c&&c!=='Sin Familia').sort();
        }).catch(()=>{ this.odooCats=['Electricidad','Plomería','Herramienta Manual','Herramienta Eléctrica','Tornillería y Fijación','Cerrajería','Iluminación','Materiales Construcción','Seguridad', ...this.pnlList].sort(); });
        const t=setInterval(()=>{
            if(window.fbA){ clearInterval(t);
                window.fbA.onAuthStateChanged(window.fbA.auth,u=>{ this.user=u; if(u) this.loadCloud(); });
            }
        },50);
    },

    setTab(t){ this.tab=t; if(t==='dash') setTimeout(()=>this.initCharts(),150); },

    async login(){ try{ await window.fbA.signInWithPopup(window.fbA.auth,new window.fbA.GoogleAuthProvider()); }catch(e){console.error(e);} },
    async logout(){ await window.fbA.signOut(window.fbA.auth); },

    dirty(item){ 
        if(!item) return;
        item.ModifiedBy=this.user.email; 
        this.dirtySet.add(item); 
    },

    async clearSess() {
        if(!confirm('¿Estás segura de Limpiar la Mesa? \n\nSe borrarán de tu pantalla las facturas XML que acabas de subir.')) return;
        this.dirtySet.clear();
        this.sessUUIDs = [];
        this.showHistory = false;
        // Al poner showHistory = false y sessUUIDs vacío, la mesa se verá limpia automáticamente.
    },

    async wipeCloud() {
        if(prompt('Para confirmar el borrado TOTAL de la base de datos histórica externa, escribe "borrar":') !== 'borrar') return;
        try {
            const b = window.fbD.writeBatch(window.fbD.db);
            const s = await window.fbD.getDocs(window.fbD.collection(window.fbD.db, 'purchase_lines'));
            let n = 0;
            s.forEach(d => { b.delete(d.ref); n++; });
            if(n===0) return alert('La base de datos ya está en 0.');
            await b.commit();
            localStorage.removeItem('hm_cache_invoices');
            alert('¡Base de datos en la nube formateada a $0!');
            location.reload();
        } catch(e) { console.error(e); alert('Error borrando bóveda.'); }
    },

    delInvoices() {
        if(!this.selU.length) return;
        if(!confirm(`¿Segura que quieres borrar estas ${this.selU.length} facturas (incluyendo todos sus artículos)?`)) return;
        this.items = this.items.filter(i => !this.selU.includes(i.UUID_Factura));
        this.sessUUIDs = this.sessUUIDs.filter(u => !this.selU.includes(u));
        this.selU = [];
        this.saveLocal();
    },

    bulkApplyType(t) {
        if(!t) return;
        this.items.forEach(i => { if(this.selU.includes(i.UUID_Factura)) { i.TipoOdoo = t; this.dirty(i); } });
        this.saveLocal();
    },

    bulkApplyCat(c) {
        if(!c) return;
        this.items.forEach(i => { if(this.selU.includes(i.UUID_Factura)) { i.Categoria = c; this.dirty(i); } });
        this.saveLocal();
    },

    printLabels() {
        const win = window.open('', '_blank');
        const store = this.labelStore;
        const html = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Etiquetas HerraMax - ${store}</title>
                <style>
                    @page { size: 50.8mm 25.4mm; margin: 0; }
                    body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: white; color: black; }
                    .labels-container { display: block; }
                    .label { 
                        width: 50.8mm; height: 25.4mm; padding: 2mm 3mm; box-sizing: border-box; 
                        display: flex; flex-direction: column; justify-content: space-between; 
                        page-break-after: always; position: relative; overflow: hidden;
                    }
                    .sku { font-size: 14pt; font-weight: 900; line-height: 1; margin-bottom: 2pt; display: block; }
                    .suffix { position: absolute; right: 3mm; top: 2mm; font-size: 8pt; font-weight: bold; border: 1.5pt solid black; padding: 1pt 3pt; background: white; }
                    .desc { font-size: 9pt; font-weight: bold; text-transform: uppercase; line-height: 1.1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
                    .cat { font-size: 7.5pt; font-style: italic; color: #333; }
                </style>
            </head>
            <body onload="window.print();">
                <div class="labels-container">
                    ${this.filteredItems.map(item => `
                        <div class="label">
                            <span class="suffix">${store}</span>
                            <div>
                                <span class="sku">${item.SKU || '---'}</span>
                                <div class="desc">${item.Producto}</div>
                            </div>
                            <div class="cat">${item.Categoria}</div>
                        </div>
                    `).join('')}
                </div>
            </body>
            </html>
        `;
        win.document.write(html);
        win.document.close();
    },

    applyBulkType(groupValue, tipo) {
        if(!tipo) return;
        let count = 0;
        this.items.forEach(item => {
            if(item[this.grpBy] === groupValue) {
                item.TipoOdoo = tipo;
                this.dirty(item);
                count++;
            }
        });
        alert(`¡Listo! Se actualizaron ${count} filas a ${tipo}`);
    },

    async loadCloud(){
        // 1. Cargar rápido del caché local si existe
        try {
            const local = localStorage.getItem('hm_cache_invoices');
            if(local) this.items = JSON.parse(local);
        } catch(e){}
        
        // 2. Traer la verdad absoluta de Firebase
        const snap=await window.fbD.getDocs(window.fbD.collection(window.fbD.db,'purchase_lines'));
        const loaded=[]; snap.forEach(d=>loaded.push(d.data())); 
        this.items=loaded;
        
        // 3. Guardar en local nuevamente
        this.saveLocal();
    },

    saveLocal() {
        try { localStorage.setItem('hm_cache_invoices', JSON.stringify(this.items)); } catch(e){}
    },

    // Sort
    sBy(col){ this.sc===col?this.sa=!this.sa:(this.sc=col,this.sa=true); },
    dsBy(col){ this.dsc===col?this.dsa=!this.dsa:(this.dsc=col,this.dsa=false); },

    dirty(item){ item.ModifiedBy=this.user.email; this.dirtySet.add(item); },

    // Files
    async onFileSel(e){ await this.procFiles(e.target.files); },
    async onDrop(e){ this.drag=false; await this.procFiles(e.dataTransfer.files); },
    async procFiles(list){
        let n=0;
        for(const f of list){
            if(f.name.toLowerCase().endsWith('.xml')){ await this.parseXML(f); n++; }
            else if(f.name.toLowerCase().endsWith('.csv')){ await this.parseCSV(f); n++; }
        }
        if(n) alert(`¡${n} archivo(s) procesados!\n\nRevisa las categorías (verde=OK, rojo=Sin Asignar). Al terminar, presiona ☁️ Sincronizar.`);
    },

    getCat(sku){
        if(sku&&this.odooSku[sku]) return this.odooSku[sku]==='Sin Familia'?null:this.odooSku[sku];
        return null;
    },

    getCatByName(name){
        if(!name||!this.odooName) return null;
        // Normalizar: minúsculas, sin acentos, solo alfanumérico
        const normed=name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
        const STOP=new Set(['de','la','el','los','las','con','sin','para','por','en','a','y','o','un','una','del','al','pza','pzas','pcs','pz','rollo','caja','pieza','piezas','metro','metros']);
        const words=normed.split(' ').filter(w=>w.length>=2&&!/^\d+(\.\d+)?$/.test(w)&&!STOP.has(w));
        if(!words.length) return null;
        // 1. Intentar match de 3, 2 y 1 palabra(s) exacto en nombres aprendidos
        for(let n=Math.min(3,words.length);n>=1;n--){
            const key=words.slice(0,n).join(' ');
            if(this.odooName[key]) return this.odooName[key];
        }
        // 2. MAGIA: Búsqueda borrosa por palabra clave en Categorías Odoo
        if (this.odooCats && this.odooCats.length) {
            const firstWord = words[0]; // Ej. "taquete"
            for (let truperCat of this.odooCats) {
                const normedCat = truperCat.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
                if (normedCat.includes(firstWord)) return truperCat;
            }
        }
        return null;
    },

    async parseXML(file){
        const xml=new DOMParser().parseFromString(await file.text(),'text/xml');
        const emisorN=xml.getElementsByTagName('cfdi:Emisor')[0]||xml.getElementsByTagName('Emisor')[0];
        const emisor=emisorN?emisorN.getAttribute('Nombre')||'Desconocido':'Desconocido';
        const timbre=xml.getElementsByTagName('tfd:TimbreFiscalDigital')[0] || xml.getElementsByTagName('TimbreFiscalDigital')[0];
        const uuid=timbre?.getAttribute('UUID')||file.name.replace('.xml','');
        const fechaTimbrado = timbre?.getAttribute('FechaTimbrado')?.substring(0,10) || 'Desconocida';
        const comp=xml.getElementsByTagName('cfdi:Comprobante')[0]||xml.getElementsByTagName('Comprobante')[0];
        const fecha=comp?.getAttribute('Fecha')?.substring(0,10)||'Desconocida';
        let cs=[...xml.getElementsByTagName('cfdi:Concepto')];
        if(!cs.length) cs=[...xml.getElementsByTagName('Concepto')];
        const rows=cs.map((c,lineIdx)=>{
            const sku=c.getAttribute('NoIdentificacion')||'';
            const prod=c.getAttribute('Descripcion');
            const cat=this.getCat(sku)||this.getCatByName(prod)||this.items.find(i=>(i.SKU===sku&&sku)||(i.Producto===prod))?.Categoria||'Sin Asignar';
            return{Fecha:fecha, Fecha_Timbrado:fechaTimbrado, Proveedor:emisor,SKU:sku,Producto:prod,
                Cantidad:parseFloat(c.getAttribute('Cantidad')),
                Costo_Unitario:parseFloat(c.getAttribute('ValorUnitario')),
                Subtotal_Total:parseFloat(c.getAttribute('Importe')),
                UUID_Factura:uuid,Categoria:cat,TipoOdoo:'Almacenable',ModifiedBy:this.user.email,
                FB_ID:(uuid+'_'+lineIdx+'_'+prod.replace(/[^a-zA-Z0-9]/g,'')).substring(0,60)};
        });
        this.sessUUIDs.push(uuid);
        this.pushRows(rows);
    },

    parseCSV(file){
        return new Promise(res=>{
            Papa.parse(file,{header:true,skipEmptyLines:true,complete:r=>{
                const rows=r.data.map((row,lineIdx)=>{
                    const sku=row.SKU||row.NoIdentificacion||'';
                    const cat=this.getCat(sku)||this.getCatByName(row.Producto)||(row.Categoria&&row.Categoria!=='Sin Asignar'?row.Categoria:null)||this.items.find(i=>(i.SKU===sku&&sku)||(i.Producto===row.Producto))?.Categoria||'Sin Asignar';
                    return{...row,SKU:sku,Categoria:cat,TipoOdoo:row.TipoOdoo||'Almacenable',ModifiedBy:this.user.email,
                        FB_ID:((row.UUID_Factura||'x')+'_'+lineIdx+'_'+row.Producto.replace(/[^a-zA-Z0-9]/g,'')).substring(0,60)};
                });
                if(rows[0]) this.sessUUIDs.push(rows[0].UUID_Factura);
                this.pushRows(rows); res();
            }});
        });
    },

    pushRows(rows){ rows.forEach(nr=>{ if(this.items.findIndex(i=>i.FB_ID===nr.FB_ID)===-1){ this.items.unshift(nr); this.dirtySet.add(nr); } }); this.saveLocal(); },

    async syncToCloud(){
        if(!this.dirtySet.size) return alert('Todo ya está sincronizado ✔️');
        this.syncing=true;
        try{
            const b=window.fbD.writeBatch(window.fbD.db); let n=0;
            this.dirtySet.forEach(item=>{
                if(!item.FB_ID) item.FB_ID=(item.UUID_Factura+'_'+item.Producto.replace(/[^a-zA-Z0-9]/g,'')).substring(0,60);
                b.set(window.fbD.doc(window.fbD.db,'purchase_lines',item.FB_ID),Alpine.raw(item)); n++;
            });
            await b.commit(); this.dirtySet.clear(); this.sessUUIDs=[];
            alert(`¡Sincronización exitosa! ${n} registros guardados.`);
            if(this.tab==='dash') this.initCharts();
        }catch(e){ console.error(e); alert('Error. Ver consola.'); }
        this.syncing=false;
    },

    exportOdooPOs(){
        const src=this.sessUUIDs.length?this.items.filter(i=>this.sessUUIDs.includes(i.UUID_Factura)):this.items;
        const by={};
        src.forEach(i=>{ if(!by[i.UUID_Factura]) by[i.UUID_Factura]=[]; by[i.UUID_Factura].push({default_code:i.SKU,Nombre:i.Producto,Cantidad:i.Cantidad,Precio_Unitario:i.Costo_Unitario,Categoria_Odoo:i.Categoria,Tipo_Config:i.TipoOdoo,Proveedor:i.Proveedor}); });
        const uu=Object.keys(by);
        if(!uu.length) return alert('No hay datos en sesión.');
        uu.forEach((uuid,idx)=>setTimeout(()=>{
            const b=new Blob([Papa.unparse(by[uuid])],{type:'text/csv;charset=utf-8;'});
            const a=document.createElement('a'); a.href=URL.createObjectURL(b);
            a.download=`Odoo_PO_${by[uuid][0].Proveedor.replace(/[^a-zA-Z]/g,'_').substring(0,12)}_${uuid.substring(0,8)}.csv`;
            a.click();
        },idx*500));
    },

    applyDash(t,v){ this.dFilt=v?{t,v}:null; this.initCharts(); },
    clearDash(){ this.dFilt=null; this.dProv=''; this.dCat=''; this.dMes=''; this.initCharts(); },

    dlFlex(){
        if(!this.dFlexItems.length) return;
        const data=this.dFlexItems.map(i=>({Fecha:i.Fecha,Proveedor:i.Proveedor,SKU:i.SKU,Producto:i.Producto,Categoria:i.Categoria,Cantidad:i.Cantidad,Costo_Unitario:i.Costo_Unitario,Subtotal_Total:i.Subtotal_Total}));
        const b=new Blob([Papa.unparse(data)],{type:'text/csv;charset=utf-8;'});
        const a=document.createElement('a'); a.href=URL.createObjectURL(b);
        const safe=this.dFilt?this.dFilt.v.replace(/[^a-zA-Z0-9]/g,'_'):'General';
        a.download=`HerraMax_${safe}.csv`; a.click();
    },

    // Charts
    initCharts(){
        const pal=['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#f43f5e','#84cc16','#fb923c','#a855f7'];
        const agg=f=>{const m={};this.items.forEach(i=>{m[i[f]]=(m[i[f]]||0)+parseFloat(i.Subtotal_Total||0);});return m;};
        this.mkChart('catChart','Categoría',agg('Categoria'),'doughnut',pal);
        const mAgg={};
        this.items.forEach(i=>{const m=(i.Fecha||'').substring(0,7);mAgg[m]=(mAgg[m]||0)+parseFloat(i.Subtotal_Total||0);});
        const sm=Object.keys(mAgg).sort().reduce((o,k)=>{o[k]=mAgg[k];return o;},{});
        this.mkChart('monthChart','Mes',sm,'bar',['#10b981']);
        const pAgg=agg('Proveedor');
        const tp=Object.entries(pAgg).sort((a,b)=>b[1]-a[1]).slice(0,6).reduce((o,[k,v])=>{o[k]=v;return o;},{});
        this.mkChart('provChart','Proveedor',tp,'bar',pal);
    },

    mkChart(id,ft,dataMap,type,colors){
        const ctx=document.getElementById(id); if(!ctx) return;
        if(this.charts[id]) this.charts[id].destroy();
        this.charts[id]=new Chart(ctx.getContext('2d'),{
            type,
            data:{labels:Object.keys(dataMap),datasets:[{data:Object.values(dataMap),backgroundColor:type==='doughnut'?colors:colors[0],borderColor:'transparent',tension:0.3}]},
            options:{responsive:true,maintainAspectRatio:false,
                plugins:{legend:{display:type==='doughnut',position:'bottom',labels:{color:'#cbd5e1',boxWidth:12,font:{size:10}}}},
                scales:type!=='doughnut'?{x:{ticks:{color:'#94a3b8',maxRotation:30,font:{size:9}}},y:{ticks:{color:'#94a3b8'}}}:{},
                onClick:(e,els)=>{ if(els.length){ const lbl=this.charts[id].data.labels[els[0].index]; this.applyDash(ft,lbl); } }
            }
        });
    }
}));
});
</script>
