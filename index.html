<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerraMax | Inteligencia de Compras</title>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        primary: '#3b82f6',
                        accent: '#f59e0b'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .resizable-th {
            resize: horizontal;
            overflow: auto;
            position: relative;
        }
        .resizable-th::after {
            content: '';
            position: absolute;
            right: 0; top: 0; bottom: 0; width: 4px;
            cursor: col-resize;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="min-h-screen text-slate-200" x-data="procurementApp()">

    <!-- Modulo Firebase ESM -->
    <script type="module">

        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAa57ppjWFUcEdniw9WScABHssyACP3x3k",
            authDomain: "compras-herramax.firebaseapp.com",
            projectId: "compras-herramax",
            storageBucket: "compras-herramax.firebasestorage.app",
            messagingSenderId: "558573642669",
            appId: "1:558573642669:web:f967def7deb883fa16b724"
        };

        const app = initializeApp(firebaseConfig);
        window.fbAuth = { auth: getAuth(app), signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut };
        window.fbDb = { db: getFirestore(app), collection, doc, setDoc, getDocs, writeBatch };
    </script>

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="h-8 w-8 rounded bg-gradient-to-br from-primary to-blue-300 flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                HM
            </div>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">
                Purchasing Intelligence
            </h1>
        </div>
        
        <div class="flex items-center gap-4">
            <template x-if="!user">
                <button @click="login()" class="px-4 py-2 bg-white text-slate-800 hover:bg-slate-200 rounded-lg text-sm font-semibold transition-all flex items-center gap-2">
                    Ingresar con Google
                </button>
            </template>
            
            <template x-if="user">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 text-sm text-slate-300">
                        <img :src="user.photoURL" class="w-8 h-8 rounded-full border border-primary">
                        <span x-text="user.email"></span>
                    </div>
                    <button @click="syncToCloud()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-semibold transition-all flex items-center gap-2" :class="isSyncing ? 'animate-pulse' : ''">
                        ☁️ Sincronizar Nube
                    </button>
                    <!-- Tabs Navigation in Desktop Navbar -->
                    <button @click="exportOdooPOs()" class="px-4 py-2 bg-gradient-to-r from-blue-600 to-primary hover:from-blue-500 rounded-lg text-sm font-semibold transition-all shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                        🚀 Exportar Odoo POs
                    </button>
                    <button @click="logout()" class="text-xs text-red-400 hover:text-red-300 underline">Salir</button>
                </div>
            </template>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="p-6 max-w-[1400px] mx-auto space-y-6">
        
        <div x-show="!user" class="glass p-8 rounded-2xl border border-accent/50 text-center">
            <h2 class="text-2xl font-bold mb-2">🔒 Acceso Restringido</h2>
            <p class="text-slate-400 mb-4">Inicia sesión con tu cuenta de Google Autorizada para ver y procesar facturas en HerraMax.</p>
        </div>

        <template x-if="user">
            <div>
                <!-- TABS UI -->
                <div class="flex gap-2 mb-6 bg-slate-800/50 p-1 rounded-xl w-fit">
                    <button @click="currentTab = 'procesamiento'" class="px-6 py-2 rounded-lg text-sm font-bold transition-all" :class="currentTab === 'procesamiento' ? 'bg-primary text-white shadow-lg' : 'text-slate-400 hover:text-white'">
                        📥 Procesamiento Vía XML / CSV
                    </button>
                    <button @click="currentTab = 'dashboard'; setTimeout(()=>initCharts(), 100)" class="px-6 py-2 rounded-lg text-sm font-bold transition-all" :class="currentTab === 'dashboard' ? 'bg-accent text-white shadow-lg' : 'text-slate-400 hover:text-white'">
                        📈 Dashboard Analítico
                    </button>
                </div>

                <!-- TABS CONTAINER -->
                <div class="relative">
                    
                    <!-- TAB 1: PROCESAMIENTO -->
                    <div x-show="currentTab === 'procesamiento'" x-transition class="space-y-6">
                        <!-- MUlti-file uploader -->
                        <div class="glass p-6 rounded-2xl border border-blue-500/30 flex flex-col justify-center text-center transition-all relative overflow-hidden"
                             @dragover.prevent="dragOver = true" 
                             @dragleave.prevent="dragOver = false" 
                             @drop.prevent="handleDrop($event)"
                             :class="dragOver ? 'border-primary bg-primary/10' : ''">
                            
                            <div class="absolute -right-10 -top-10 w-32 h-32 bg-primary/20 blur-3xl rounded-full"></div>
                            
                            <h2 class="text-xl font-bold mb-2 relative z-10 flex items-center justify-center gap-2">
                                <span>Lanza tus Facturas Aquí</span> 📄📦
                            </h2>
                            <p class="text-sm text-slate-400 mb-4 relative z-10">
                                Arrastra directamente TODOS tus <b>archivos .XML (Facturas SAT)</b>. <br>El motor extraerá SKUs, Fechas y Productos.
                            </p>
                            <label class="cursor-pointer px-4 py-2 bg-primary hover:bg-blue-500 rounded-lg font-semibold transition-colors mx-auto inline-block text-sm relative z-10">
                                <span>📥 Seleccionar Archivos (XML o CSV)</span>
                                <input type="file" multiple accept=".csv, .xml" class="hidden" @change="handleFileSelect">
                            </label>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div class="glass p-5 rounded-xl border border-slate-700/50">
                                <p class="text-sm text-slate-400 font-semibold mb-1">Gasto Histórico (Nube)</p>
                                <p class="text-3xl font-bold text-white" x-text="'$' + totalSpent.toLocaleString('en-US', {minimumFractionDigits: 2})"></p>
                            </div>
                            <div class="glass p-5 rounded-xl border border-slate-700/50">
                                <p class="text-sm text-slate-400 font-semibold mb-1">Artículos Nube</p>
                                <p class="text-3xl font-bold text-blue-400" x-text="items.length"></p>
                            </div>
                            <div class="glass p-5 rounded-xl border border-slate-700/50">
                                <p class="text-sm text-slate-400 font-semibold mb-1">Facturas Consolidables</p>
                                <p class="text-3xl font-bold text-accent" x-text="uniqueInvoices.length"></p>
                            </div>
                            <div class="glass p-5 rounded-xl border border-slate-700/50 relative overflow-hidden">
                                <p class="text-sm text-slate-400 font-semibold mb-1 z-10 relative">Fechas en Proceso (Evita Dobles)</p>
                                <p class="text-base font-medium text-green-400 truncate z-10 relative" x-text="sessionDates"></p>
                            </div>
                        </div>

                        <!-- Data Table -->
                        <div class="glass rounded-xl border border-slate-700/50 flex flex-col h-[650px]">
                            <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/50 rounded-t-xl gap-4">
                                <h3 class="font-semibold text-lg whitespace-nowrap">🛍️ Espacio de Trabajo (Borrador Activo)</h3>
                                <input type="text" x-model="searchQuery" placeholder="🔍 Buscar por SKU, Producto o Categoría..." class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary w-full max-w-md">
                            </div>
                            <div class="overflow-y-auto custom-scrollbar flex-1">
                                <table class="w-full text-left text-sm whitespace-nowrap">
                                    <thead class="sticky top-0 bg-slate-800/90 backdrop-blur text-slate-300 z-10 shadow-md">
                                        <tr>
                                            <th class="px-4 py-3 font-medium resizable-th cursor-pointer hover:bg-slate-700/50" @click="sortBy('SKU')">
                                                SKU/NumParte <span x-show="sortCol === 'SKU'" x-text="sortAsc ? ' 🔼' : ' 🔽'"></span>
                                            </th>
                                            <th class="px-4 py-3 font-medium resizable-th cursor-pointer hover:bg-slate-700/50" @click="sortBy('Producto')">
                                                Descripción <span x-show="sortCol === 'Producto'" x-text="sortAsc ? ' 🔼' : ' 🔽'"></span>
                                            </th>
                                            <th class="px-4 py-3 font-medium resizable-th cursor-pointer hover:bg-slate-700/50" @click="sortBy('Categoria')">
                                                Categoría Odoo <span x-show="sortCol === 'Categoria'" x-text="sortAsc ? ' 🔼' : ' 🔽'"></span>
                                            </th>
                                            <th class="px-4 py-3 font-medium resizable-th cursor-pointer hover:bg-slate-700/50 text-right" @click="sortBy('Cantidad')">
                                                Cant <span x-show="sortCol === 'Cantidad'" x-text="sortAsc ? ' 🔼' : ' 🔽'"></span>
                                            </th>
                                            <th class="px-4 py-3 font-medium resizable-th cursor-pointer hover:bg-slate-700/50 text-right" @click="sortBy('Costo_Unitario')">
                                                Costo Unit <span x-show="sortCol === 'Costo_Unitario'" x-text="sortAsc ? ' 🔼' : ' 🔽'"></span>
                                            </th>
                                            <th class="px-4 py-3 font-medium resizable-th cursor-pointer hover:bg-slate-700/50 text-right" @click="sortBy('Subtotal_Total')">
                                                Subtotal ($) <span x-show="sortCol === 'Subtotal_Total'" x-text="sortAsc ? ' 🔼' : ' 🔽'"></span>
                                            </th>
                                            <th class="px-4 py-3 font-medium text-center">Proveedor</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-700/50 text-xs">
                                        <template x-for="(item, index) in filteredItems" :key="item.FB_ID || index">
                                            <tr class="hover:bg-slate-700/30 transition-colors" :class="sessionAddedUUIDs.includes(item.UUID_Factura) ? 'bg-blue-900/10' : ''">
                                                <td class="px-4 py-2 font-mono text-accent font-bold" x-text="item.SKU || '-'"></td>
                                                <td class="px-4 py-2 truncate max-w-[200px]" :title="item.Producto" x-text="item.Producto" ></td>
                                                <td class="px-4 py-2">
                                                    <select x-model="item.Categoria" @change="markDirty(item)" class="bg-slate-900 border border-slate-600 rounded px-2 py-1 focus:outline-none focus:border-primary w-32 font-semibold" :class="item.Categoria !== 'Sin Asignar' ? 'text-green-400' : 'text-red-400'">
                                                        <option value="Sin Asignar">❌ Sin Asignar</option>
                                                        <option value="Electricidad">⚡ Electricidad</option>
                                                        <option value="Plomería">🚰 Plomería</option>
                                                        <option value="Herramienta Manual">🔨 Herr. Manual</option>
                                                        <option value="Herramienta Eléctrica">🔌 Herr. Eléctrica</option>
                                                        <option value="Tornillería y Fijación">🔩 Tornillería</option>
                                                        <option value="Cerrajería">🔑 Cerrajería</option>
                                                        <option value="Iluminación">💡 Iluminación</option>
                                                        <option value="Materiales Construcción">🧱 Construcción</option>
                                                        <option value="Seguridad">🛡️ Seguridad</option>
                                                    </select>
                                                </td>
                                                <td class="px-4 py-2 text-right" x-text="item.Cantidad"></td>
                                                <td class="px-4 py-2 text-right font-mono" x-text="'$'+(parseFloat(item.Costo_Unitario) || 0).toFixed(2)"></td>
                                                <td class="px-4 py-2 text-right font-mono text-blue-300 font-bold" x-text="'$'+(parseFloat(item.Subtotal_Total) || 0).toFixed(2)"></td>
                                                <td class="px-4 py-2 text-center text-slate-500 truncate max-w-[120px]" x-text="item.Proveedor" :title="item.Proveedor"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- TAB 2: DASHBOARD ANALITICO (TABLA DINÁMICA MÁGICA) -->
                    <div x-show="currentTab === 'dashboard'" x-transition style="display: none;" class="space-y-6">
                        
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div class="glass p-5 rounded-xl border border-slate-700/50 shadow-lg">
                                <h3 class="font-bold text-center mb-4 text-slate-300">Gasto por Categoría</h3>
                                <div class="relative h-64"><canvas id="catChart"></canvas></div>
                            </div>
                            <div class="glass p-5 rounded-xl border border-slate-700/50 shadow-lg">
                                <h3 class="font-bold text-center mb-4 text-slate-300">Gasto por Mes</h3>
                                <div class="relative h-64"><canvas id="monthChart"></canvas></div>
                            </div>
                            <div class="glass p-5 rounded-xl border border-slate-700/50 shadow-lg">
                                <h3 class="font-bold text-center mb-4 text-slate-300">Gasto por Proveedor (Top)</h3>
                                <div class="relative h-64"><canvas id="provChart"></canvas></div>
                            </div>
                        </div>

                        <!-- TABLA DINÁMICA DRILL DOWN -->
                        <div class="glass rounded-xl border border-accent flex flex-col h-[500px]">
                            <div class="p-4 border-b border-accent/50 flex justify-between items-center bg-slate-800/80 rounded-t-xl gap-4">
                                <div>
                                    <h3 class="font-bold text-lg text-white">📊 Tabla Dinámica: <span x-text="dashFilter ? (dashFilter.type + ' = ' + dashFilter.value) : 'Consolidado General (Haz click en las gráficas para filtrar)'"></span></h3>
                                    <p class="text-xs text-slate-400 mt-1">Total de esta vista: <b class="text-green-400" x-text="'$' + flexTableSum.toLocaleString('en-US', {minimumFractionDigits: 2})"></b></p>
                                </div>
                                <div class="flex gap-2">
                                    <button x-show="dashFilter" @click="dashFilter = null" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs">Limpiar Filtro</button>
                                    <button @click="downloadFlexTable()" class="px-4 py-2 bg-accent hover:bg-yellow-500 text-slate-900 font-bold rounded shadow shadow-accent/50 text-sm">
                                        📥 Descargar esta Vista a CSV
                                    </button>
                                </div>
                            </div>
                            <div class="overflow-y-auto custom-scrollbar flex-1 p-2">
                                <table class="w-full text-left text-sm whitespace-nowrap">
                                    <thead class="sticky top-0 bg-slate-800/90 backdrop-blur text-accent z-10 font-bold">
                                        <tr>
                                            <th class="px-4 py-2">Fecha</th>
                                            <th class="px-4 py-2">SKU</th>
                                            <th class="px-4 py-2">Producto</th>
                                            <th class="px-4 py-2">Categoría</th>
                                            <th class="px-4 py-2">Proveedor</th>
                                            <th class="px-4 py-2 text-right">Subtotal</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-700/50 text-xs text-slate-300">
                                        <template x-for="(item, index) in flexTableItems" :key="index">
                                            <tr class="hover:bg-slate-700/30">
                                                <td class="px-4 py-2" x-text="item.Fecha"></td>
                                                <td class="px-4 py-2 font-mono text-slate-400" x-text="item.SKU"></td>
                                                <td class="px-4 py-2 truncate max-w-[200px]" x-text="item.Producto"></td>
                                                <td class="px-4 py-2 text-green-300" x-text="item.Categoria"></td>
                                                <td class="px-4 py-2 truncate max-w-[150px]" x-text="item.Proveedor"></td>
                                                <td class="px-4 py-2 text-right font-bold text-white" x-text="'$'+(parseFloat(item.Subtotal_Total) || 0).toFixed(2)"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('procurementApp', () => ({
                user: null, items: [], sessionAddedUUIDs: [], searchQuery: '', 
                currentTab: 'procesamiento', dragOver: false, isSyncing: false, dirtyItems: new Set(),
                sortCol: 'Fecha', sortAsc: false,
                dashFilter: null, charts: {},

                get totalSpent() { return this.items.reduce((sum, item) => sum + (parseFloat(item.Subtotal_Total) || 0), 0); },
                get uniqueInvoices() { return [...new Set(this.items.map(i => i.UUID_Factura).filter(Boolean))]; },
                get sessionDates() { 
                    const sessionItems = this.items.filter(i => this.sessionAddedUUIDs.includes(i.UUID_Factura));
                    const dates = [...new Set(sessionItems.map(i => i.Fecha))].filter(Boolean);
                    if(dates.length === 0) return 'Todo Procesado ✔️';
                    return dates.join(' | ');
                },
                get filteredItems() {
                    let result = this.items;
                    if (this.searchQuery !== '') {
                        const lq = this.searchQuery.toLowerCase();
                        result = result.filter(i => 
                            (i.Producto && i.Producto.toLowerCase().includes(lq)) || 
                            (i.SKU && String(i.SKU).toLowerCase().includes(lq)) ||
                            (i.Categoria && i.Categoria.toLowerCase().includes(lq))
                        );
                    }
                    if (this.sortCol) {
                        result = [...result].sort((a, b) => {
                            let valA = a[this.sortCol] || ''; let valB = b[this.sortCol] || '';
                            if (typeof valA === 'string') valA = valA.toLowerCase(); if (typeof valB === 'string') valB = valB.toLowerCase();
                            if(this.sortCol === 'Cantidad' || this.sortCol === 'Costo_Unitario' || this.sortCol === 'Subtotal_Total') {
                                valA = parseFloat(valA)||0; valB = parseFloat(valB)||0;
                            }
                            if (valA < valB) return this.sortAsc ? -1 : 1;
                            if (valA > valB) return this.sortAsc ? 1 : -1;
                            return 0;
                        });
                    }
                    return result;
                },

                // DASHBOARD TABLES LOGIC
                get flexTableItems() {
                    let filtered = this.items;
                    if(this.dashFilter !== null) {
                        filtered = this.items.filter(i => {
                            if(this.dashFilter.type === 'Categoría') return i.Categoria === this.dashFilter.value;
                            if(this.dashFilter.type === 'Proveedor') return i.Proveedor === this.dashFilter.value;
                            if(this.dashFilter.type === 'Mes') return (i.Fecha || '').substring(0,7) === this.dashFilter.value;
                            return false;
                        });
                    }
                    // sort by subtotal desc
                    return filtered.sort((a,b) => parseFloat(b.Subtotal_Total) - parseFloat(a.Subtotal_Total));
                },
                get flexTableSum() {
                    return this.flexTableItems.reduce((s,i) => s + (parseFloat(i.Subtotal_Total)||0), 0);
                },

                sortBy(col) {
                    if(this.sortCol === col) this.sortAsc = !this.sortAsc;
                    else { this.sortCol = col; this.sortAsc = true; }
                },

                init() {
                    const checkFirebase = setInterval(() => {
                        if (window.fbAuth) {
                            clearInterval(checkFirebase);
                            window.fbAuth.onAuthStateChanged(window.fbAuth.auth, (user) => {
                                this.user = user;
                                if (user) Object.values(this.charts).forEach(c => c && c.destroy()), this.loadFromCloud();
                            });
                        }
                    }, 50);
                },
                
                async login() {
                    const provider = new window.fbAuth.GoogleAuthProvider();
                    try { await window.fbAuth.signInWithPopup(window.fbAuth.auth, provider); } 
                    catch (error) { console.error(error); }
                },
                async logout() { await window.fbAuth.signOut(window.fbAuth.auth); },

                async loadFromCloud() {
                    const querySnapshot = await window.fbDb.getDocs(window.fbDb.collection(window.fbDb.db, "purchase_lines"));
                    const loaded = [];
                    querySnapshot.forEach((doc) => { loaded.push(doc.data()); });
                    this.items = loaded;
                },

                markDirty(item) {
                    item.ModifiedBy = this.user.email;
                    this.dirtyItems.add(item);
                },

                async handleFileSelect(event) { await this.processFiles(event.target.files); },
                async handleDrop(event) { this.dragOver = false; await this.processFiles(event.dataTransfer.files); },

                async processFiles(fileList) {
                    let filesProcessed = 0;
                    for (let i = 0; i < fileList.length; i++) {
                        const file = fileList[i];
                        if (file.name.toLowerCase().endsWith('.xml')) {
                            await this.parseXML(file);
                            filesProcessed++;
                        } else if (file.name.toLowerCase().endsWith('.csv')) {
                            await this.parseCSV(file);
                            filesProcessed++;
                        }
                    }
                    if(filesProcessed > 0) alert(`¡Procesadas! \n\nNo olvides revisar las asignaciones de Categoría. Si la categoría de la AI fue equivocada, cámbiala y da click en Sincronizar Nube.`);
                },

                async parseXML(file) {
                    const text = await file.text();
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, "text/xml");
                    
                    let emisorNombre = "Desconocido";
                    const emisorNode = xml.getElementsByTagName("cfdi:Emisor")[0] || xml.getElementsByTagName("Emisor")[0];
                    if(emisorNode) emisorNombre = emisorNode.getAttribute("Nombre") || "Desconocido";
                    
                    let uuid = file.name.replace('.xml', '');
                    const timbreNode = xml.getElementsByTagName("tfd:TimbreFiscalDigital")[0];
                    if(timbreNode && timbreNode.getAttribute("UUID")) uuid = timbreNode.getAttribute("UUID");
                    
                    let fecha = "Desconocida";
                    const comprobanteNode = xml.getElementsByTagName("cfdi:Comprobante")[0] || xml.getElementsByTagName("Comprobante")[0];
                    if(comprobanteNode && comprobanteNode.getAttribute("Fecha")) fecha = comprobanteNode.getAttribute("Fecha").substring(0, 10);
                    
                    let conceptos = Array.from(xml.getElementsByTagName("cfdi:Concepto"));
                    if(conceptos.length === 0) conceptos = Array.from(xml.getElementsByTagName("Concepto"));
                    
                    const newRows = conceptos.map(c => {
                        const sku = c.getAttribute("NoIdentificacion") || "";
                        const prod = c.getAttribute("Descripcion");
                        const historyMatch = this.items.find(i => (i.SKU === sku && sku !== "") || i.Producto === prod);
                        const autoCat = historyMatch ? historyMatch.Categoria : 'Sin Asignar';
                        return {
                            Fecha: fecha, Proveedor: emisorNombre, SKU: sku, Producto: prod,
                            Cantidad: parseFloat(c.getAttribute("Cantidad")),
                            Costo_Unitario: parseFloat(c.getAttribute("ValorUnitario")),
                            Subtotal_Total: parseFloat(c.getAttribute("Importe")),
                            UUID_Factura: uuid, Categoria: autoCat, ModifiedBy: this.user.email,
                            FB_ID: (uuid + "_" + prod.replace(/[^a-zA-Z0-9]/g, "")).substring(0,60)
                        };
                    });
                    this.sessionAddedUUIDs.push(uuid);
                    this.pushNewRows(newRows);
                },

                parseCSV(file) {
                    return new Promise((resolve) => {
                        Papa.parse(file, {
                            header: true, skipEmptyLines: true,
                            complete: (results) => {
                                const newRows = results.data.map(row => {
                                    const sku = row.SKU || row.NoIdentificacion || "";
                                    const historyMatch = this.items.find(i => (i.SKU === sku && sku !== "") || i.Producto === row.Producto);
                                    let cat = row.Categoria || 'Sin Asignar';
                                    if(cat === 'Sin Asignar' && historyMatch) cat = historyMatch.Categoria;
                                    return {
                                        ...row, SKU: sku, Categoria: cat, ModifiedBy: this.user.email,
                                        FB_ID: (row.UUID_Factura + "_" + row.Producto.replace(/[^a-zA-Z0-9]/g, "")).substring(0,60)
                                    };
                                });
                                if(newRows.length > 0) this.sessionAddedUUIDs.push(newRows[0].UUID_Factura);
                                this.pushNewRows(newRows);
                                resolve();
                            }
                        });
                    });
                },

                pushNewRows(rows) {
                    rows.forEach(nr => {
                        const exists = this.items.findIndex(i => i.FB_ID === nr.FB_ID);
                        if(exists === -1) {
                            this.items.unshift(nr);
                            this.dirtyItems.add(nr);
                        }
                    });
                },

                async syncToCloud() {
                    if (this.dirtyItems.size === 0) return alert("Todo está sincronizado con la nube de HerraMax.");
                    this.isSyncing = true;
                    try {
                        const batch = window.fbDb.writeBatch(window.fbDb.db);
                        let count = 0;
                        this.dirtyItems.forEach(item => {
                            if (!item.FB_ID) item.FB_ID = (item.UUID_Factura + "_" + item.Producto.replace(/[^a-zA-Z0-9]/g, "")).substring(0,60);
                            const docRef = window.fbDb.doc(window.fbDb.db, "purchase_lines", item.FB_ID);
                            batch.set(docRef, Alpine.raw(item));
                            count++;
                        });
                        await batch.commit();
                        this.dirtyItems.clear();
                        this.sessionAddedUUIDs = []; // clear session tracking
                        alert(`¡Sincronización exitosa! ${count} artículos consolidados en la nube.`);
                        if(this.currentTab === 'dashboard') this.initCharts();
                    } catch (e) {
                        console.error(e);
                        alert("Error al sincronizar.");
                    }
                    this.isSyncing = false;
                },

                exportOdooPOs() {
                    const byInvoice = {};
                    this.items.filter(i => this.sessionAddedUUIDs.length===0 || this.sessionAddedUUIDs.includes(i.UUID_Factura)).forEach(i => {
                        if(!byInvoice[i.UUID_Factura]) byInvoice[i.UUID_Factura] = [];
                        byInvoice[i.UUID_Factura].push({
                            'default_code': i.SKU, 'Nombre': i.Producto, 'Cantidad': i.Cantidad, 
                            'Precio_Unitario': i.Costo_Unitario, 'Categoria_Odoo': i.Categoria, 'Info_Proveedor': i.Proveedor
                        });
                    });
                    const uuids = Object.keys(byInvoice);
                    if(uuids.length===0) return alert("No hay datos en sesión para exportar.");
                    uuids.forEach((uuid, idx) => {
                        setTimeout(() => {
                            const csv = Papa.unparse(byInvoice[uuid]);
                            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                            const link = document.createElement("a");
                            link.href = URL.createObjectURL(blob);
                            const supplierName = byInvoice[uuid][0].Info_Proveedor.replace(/[^a-zA-Z]/g, '_').substring(0,10);
                            link.download = `Odoo_PO_${supplierName}_${uuid.substring(0,8)}.csv`;
                            link.click();
                        }, idx * 500); 
                    });
                },

                downloadFlexTable() {
                    if(this.flexTableItems.length === 0) return;
                    const cleanData = this.flexTableItems.map(i => ({
                        'Fecha': i.Fecha, 'Proveedor': i.Proveedor, 'SKU': i.SKU, 'Producto': i.Producto,
                        'Categoria_Odoo': i.Categoria, 'Cantidad': i.Cantidad, 'Costo_Unitario': i.Costo_Unitario,
                        'Subtotal_Total': i.Subtotal_Total
                    }));
                    const csv = Papa.unparse(cleanData);
                    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    const safeFilter = this.dashFilter ? this.dashFilter.value.replace(/[^a-zA-Z0-9]/g, '_') : 'General';
                    link.download = `HerraMax_Reporte_${safeFilter}.csv`;
                    link.click();
                },

                // ------------------ CHARTS ENGINE ------------------
                initCharts() {
                    this.createChart('catChart', 'Categoría', this.aggregateBy('Categoria'), 'doughnut', ['#3b82f6', '#f59e0b', '#10b981', '#ef4444', '#8b5cf6', '#06b6d4']);
                    
                    const mesAgg = {};
                    this.items.forEach(i => { const m = (i.Fecha||'').substring(0,7); mesAgg[m] = (mesAgg[m]||0) + parseFloat(i.Subtotal_Total); });
                    const sortedMes = Object.keys(mesAgg).sort().reduce((obj, key) => { obj[key] = mesAgg[key]; return obj; }, {});
                    this.createChart('monthChart', 'Mes', sortedMes, 'line', ['#10b981']);

                    const provAgg = this.aggregateBy('Proveedor');
                    const topProv = Object.entries(provAgg).sort((a,b)=>b[1]-a[1]).slice(0,5).reduce((obj, [k,v]) => { obj[k]=v; return obj; }, {});
                    this.createChart('provChart', 'Proveedor', topProv, 'bar', ['#3b82f6']);
                },

                aggregateBy(field) {
                    const map = {};
                    this.items.forEach(i => { map[i[field]] = (map[i[field]] || 0) + parseFloat(i.Subtotal_Total||0); });
                    return map;
                },

                createChart(canvasId, filterType, dataMap, cType, colors) {
                    const ctx = document.getElementById(canvasId);
                    if(!ctx) return;
                    if(this.charts[canvasId]) this.charts[canvasId].destroy();
                    
                    this.charts[canvasId] = new Chart(ctx.getContext('2d'), {
                        type: cType,
                        data: {
                            labels: Object.keys(dataMap),
                            datasets: [{
                                data: Object.values(dataMap),
                                backgroundColor: cType==='doughnut' ? colors : colors[0],
                                borderColor: cType==='line' ? colors[0] : 'transparent',
                                tension: 0.3, fill: true
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { display: cType==='doughnut', position: 'bottom', labels:{color:'#cbd5e1'} } },
                            scales: cType!=='doughnut' ? {
                                x: { ticks: {color: '#94a3b8'} }, y: { ticks: {color: '#94a3b8'} }
                            } : {},
                            onClick: (e, elements) => {
                                if(elements.length > 0) {
                                    const idx = elements[0].index;
                                    const label = this.charts[canvasId].data.labels[idx];
                                    this.dashFilter = { type: filterType, value: label };
                                }
                            }
                        }
                    });
                }
            }));
        });
    </script>
</body>
</html>
