<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerraMax | Inteligencia de Compras</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'] }, colors: { dark:'#0f172a', card:'#1e293b', primary:'#3b82f6', accent:'#f59e0b' } } } }
    </script>
    <style>
        body { font-family:'Inter',sans-serif; background:#0f172a; color:#f8fafc; }
        .glass { background:rgba(30,41,59,0.7); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar{width:6px} .custom-scrollbar::-webkit-scrollbar-track{background:#1e293b} .custom-scrollbar::-webkit-scrollbar-thumb{background:#475569;border-radius:4px}
        .resizable-th { resize:horizontal; overflow:auto; position:relative; min-width:60px; }
        .resizable-th::after { content:''; position:absolute; right:0;top:0;bottom:0;width:3px; cursor:col-resize; background:rgba(255,255,255,0.1); }
        .chip { display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s; }
        .chip-active { background:#3b82f6;color:#fff; }
        .chip-inactive { background:#1e293b;color:#94a3b8;border:1px solid #334155; }
        .chip-inactive:hover { border-color:#3b82f6;color:#93c5fd; }
        .filter-pill { display:inline-flex;align-items:center;gap:6px;padding:3px 12px;background:#1e3a5f;border:1px solid #3b82f6;border-radius:999px;font-size:11px;color:#93c5fd; }
        .group-header { background:rgba(59,130,246,0.08);border-left:3px solid #3b82f6; }
        tr.group-header td { padding:6px 16px;font-weight:700;color:#93c5fd;font-size:11px;letter-spacing:.05em;text-transform:uppercase; }
    </style>
</head>
<body class="min-h-screen" x-data="procurementApp()">

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
        const app = initializeApp({ apiKey:"AIzaSyAa57ppjWFUcEdniw9WScABHssyACP3x3k", authDomain:"compras-herramax.firebaseapp.com", projectId:"compras-herramax", storageBucket:"compras-herramax.firebasestorage.app", messagingSenderId:"558573642669", appId:"1:558573642669:web:f967def7deb883fa16b724" });
        window.fbAuth = { auth:getAuth(app), signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut };
        window.fbDb  = { db:getFirestore(app), collection, doc, setDoc, getDocs, writeBatch };
    </script>

    <!-- NAV -->
    <nav class="glass sticky top-0 z-50 px-6 py-3 flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-3">
            <div class="h-9 w-9 rounded-lg bg-gradient-to-br from-primary to-blue-300 flex items-center justify-center font-black text-white text-lg shadow-[0_0_18px_rgba(59,130,246,0.6)]">HM</div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">Purchasing Intelligence</span>
        </div>
        <div class="flex items-center gap-3">
            <template x-if="!user">
                <button @click="login()" class="px-5 py-2 bg-white text-slate-800 hover:bg-slate-100 rounded-lg text-sm font-bold transition-all">🔑 Ingresar con Google</button>
            </template>
            <template x-if="user">
                <div class="flex items-center gap-3">
                    <img :src="user.photoURL" class="w-8 h-8 rounded-full border-2 border-primary">
                    <span class="text-xs text-slate-400 hidden md:block" x-text="user.email"></span>
                    <button @click="syncToCloud()" class="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs font-bold transition-all" :class="isSyncing?'animate-pulse':''">☁️ Sincronizar</button>
                    <button @click="exportOdooPOs()" class="px-4 py-2 bg-gradient-to-r from-blue-600 to-primary hover:brightness-110 rounded-lg text-sm font-bold shadow-[0_0_15px_rgba(59,130,246,0.4)] transition-all">🚀 Exportar POs</button>
                    <button @click="logout()" class="text-xs text-red-400 hover:text-red-300">Salir</button>
                </div>
            </template>
        </div>
    </nav>

    <main class="p-5 max-w-[1500px] mx-auto space-y-4">

        <div x-show="!user" class="glass p-10 rounded-2xl border border-accent/50 text-center mt-10">
            <div class="text-5xl mb-4">🔒</div>
            <h2 class="text-2xl font-bold mb-2">Acceso Restringido</h2>
            <p class="text-slate-400">Inicia sesión con tu cuenta de Google autorizada para gestionar las compras de HerraMax.</p>
        </div>

        <template x-if="user">
        <div>
            <!-- TABS -->
            <div class="flex gap-2 mb-4 bg-slate-800/60 p-1 rounded-xl w-fit">
                <button @click="setTab('procesamiento')" class="px-5 py-2 rounded-lg text-sm font-bold transition-all" :class="currentTab==='procesamiento'?'bg-primary text-white shadow-lg':'text-slate-400 hover:text-white'">📥 Procesamiento XML / CSV</button>
                <button @click="setTab('dashboard')" class="px-5 py-2 rounded-lg text-sm font-bold transition-all" :class="currentTab==='dashboard'?'bg-accent text-slate-900 shadow-lg':'text-slate-400 hover:text-white'">📊 Dashboard Analítico</button>
            </div>

            <!-- ===== TAB PROCESAMIENTO ===== -->
            <div x-show="currentTab==='procesamiento'" x-transition class="space-y-4">

                <!-- Upload Zone -->
                <div class="glass p-5 rounded-2xl border border-dashed border-blue-500/40 text-center relative overflow-hidden transition-all"
                     @dragover.prevent="dragOver=true" @dragleave.prevent="dragOver=false" @drop.prevent="handleDrop($event)"
                     :class="dragOver?'border-primary bg-primary/10 scale-[1.01]':''">
                    <div class="absolute -right-8 -top-8 w-28 h-28 bg-primary/15 blur-3xl rounded-full pointer-events-none"></div>
                    <p class="text-lg font-bold mb-1">Lanza tus Facturas Aquí 📄📦</p>
                    <p class="text-xs text-slate-400 mb-3">Arrastra archivos <b>.XML</b> (CFDI SAT) o <b>.CSV</b> —el motor extrae SKUs, fechas y precios automáticamente</p>
                    <label class="cursor-pointer px-5 py-2 bg-primary hover:bg-blue-500 rounded-lg font-bold text-sm transition-colors inline-block">
                        📥 Seleccionar Archivos
                        <input type="file" multiple accept=".csv,.xml" class="hidden" @change="handleFileSelect">
                    </label>
                </div>

                <!-- KPI Cards -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div class="glass p-4 rounded-xl"><p class="text-xs text-slate-400 font-semibold">Gasto Histórico Nube</p><p class="text-2xl font-black text-white" x-text="'$'+totalSpent.toLocaleString('en-US',{minimumFractionDigits:2})"></p></div>
                    <div class="glass p-4 rounded-xl"><p class="text-xs text-slate-400 font-semibold">Artículos en Nube</p><p class="text-2xl font-black text-blue-400" x-text="items.length"></p></div>
                    <div class="glass p-4 rounded-xl"><p class="text-xs text-slate-400 font-semibold">Facturas Únicas</p><p class="text-2xl font-black text-accent" x-text="uniqueInvoices.length"></p></div>
                    <div class="glass p-4 rounded-xl"><p class="text-xs text-slate-400 font-semibold mb-1">Fechas Sesión (Evita Dobles)</p><p class="text-sm font-bold text-green-400" x-text="sessionDates"></p></div>
                </div>

                <!-- Filter Bar -->
                <div class="glass rounded-xl border border-slate-700/50 p-3 space-y-3">
                    <div class="flex flex-wrap items-center gap-2">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wide">Filtros &amp; Agrupamiento</span>

                        <!-- Busqueda -->
                        <input type="text" x-model="searchQuery" placeholder="🔍 SKU, Producto, Categoría, Proveedor..." class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:border-primary flex-1 min-w-[200px]">

                        <!-- Agrupar por -->
                        <span class="text-xs text-slate-500">Agrupar por:</span>
                        <template x-for="g in ['Ninguno','Categoria','Proveedor','Fecha']" :key="g">
                            <button @click="groupBy=g" class="chip" :class="groupBy===g?'chip-active':'chip-inactive'" x-text="g"></button>
                        </template>

                        <!-- Quick Filters -->
                        <span class="text-xs text-slate-500 ml-2">Mostrar:</span>
                        <button @click="filterCat=''" class="chip" :class="filterCat===''?'chip-active':'chip-inactive'">Todos</button>
                        <button @click="filterCat='Sin Asignar'" class="chip" :class="filterCat==='Sin Asignar'?'bg-red-600 text-white chip':'chip-inactive'">❌ Sin Asignar</button>
                        <button @click="filterCat='_ok'" class="chip" :class="filterCat==='_ok'?'bg-green-600 text-white':'chip-inactive'">✅ Clasificados</button>

                        <!-- Filtro por proveedor -->
                        <select x-model="filterProv" class="bg-slate-900 border border-slate-600 rounded-lg px-2 py-1 text-xs focus:outline-none focus:border-primary">
                            <option value="">Todos los proveedores</option>
                            <template x-for="p in allProveedores" :key="p"><option :value="p" x-text="p"></option></template>
                        </select>

                        <!-- Clear -->
                        <button x-show="searchQuery||filterCat||filterProv" @click="searchQuery='';filterCat='';filterProv=''" class="text-xs text-red-400 hover:text-red-300 underline">limpiar</button>
                    </div>

                    <!-- Active-filter pills -->
                    <div x-show="searchQuery||filterCat||filterProv" class="flex flex-wrap gap-2">
                        <div x-show="searchQuery" class="filter-pill">🔍 "<span x-text="searchQuery"></span>" <button @click="searchQuery=''" class="ml-1 text-blue-300 hover:text-white">✕</button></div>
                        <div x-show="filterCat==='Sin Asignar'" class="filter-pill border-red-500 text-red-300">❌ Sin Asignar <button @click="filterCat=''" class="ml-1 hover:text-white">✕</button></div>
                        <div x-show="filterCat==='_ok'" class="filter-pill border-green-500 text-green-300">✅ Clasificados <button @click="filterCat=''" class="ml-1 hover:text-white">✕</button></div>
                        <div x-show="filterProv" class="filter-pill">📦 <span x-text="filterProv"></span> <button @click="filterProv=''" class="ml-1 hover:text-white">✕</button></div>
                    </div>
                </div>

                <!-- Counter -->
                <div class="flex justify-between items-center text-xs text-slate-500 px-1">
                    <span>Mostrando <b class="text-slate-300" x-text="displayedRowCount"></b> de <b class="text-slate-300" x-text="items.length"></b> artículos</span>
                    <span>Subtotal filtrado: <b class="text-blue-300" x-text="'$'+filteredSubtotal.toLocaleString('en-US',{minimumFractionDigits:2})"></b></span>
                </div>

                <!-- Table -->
                <div class="glass rounded-xl border border-slate-700/50 flex flex-col" style="height:560px">
                    <div class="overflow-y-auto custom-scrollbar flex-1">
                        <table class="w-full text-left text-xs">
                            <thead class="sticky top-0 bg-slate-800/95 backdrop-blur text-slate-300 z-10">
                                <tr>
                                    <th class="px-3 py-3 font-semibold resizable-th cursor-pointer hover:bg-slate-700/50 select-none" @click="sortBy('SKU')">SKU / NumParte <span x-show="sortCol==='SKU'" x-text="sortAsc?'🔼':'🔽'"></span></th>
                                    <th class="px-3 py-3 font-semibold resizable-th cursor-pointer hover:bg-slate-700/50 select-none" @click="sortBy('Producto')">Descripción <span x-show="sortCol==='Producto'" x-text="sortAsc?'🔼':'🔽'"></span></th>
                                    <th class="px-3 py-3 font-semibold resizable-th cursor-pointer hover:bg-slate-700/50 select-none" @click="sortBy('Categoria')">Categoría Odoo <span x-show="sortCol==='Categoria'" x-text="sortAsc?'🔼':'🔽'"></span></th>
                                    <th class="px-3 py-3 font-semibold resizable-th cursor-pointer hover:bg-slate-700/50 select-none text-right" @click="sortBy('Cantidad')">Cant <span x-show="sortCol==='Cantidad'" x-text="sortAsc?'🔼':'🔽'"></span></th>
                                    <th class="px-3 py-3 font-semibold resizable-th cursor-pointer hover:bg-slate-700/50 select-none text-right" @click="sortBy('Costo_Unitario')">Costo Unit <span x-show="sortCol==='Costo_Unitario'" x-text="sortAsc?'🔼':'🔽'"></span></th>
                                    <th class="px-3 py-3 font-semibold resizable-th cursor-pointer hover:bg-slate-700/50 select-none text-right" @click="sortBy('Subtotal_Total')">Subtotal <span x-show="sortCol==='Subtotal_Total'" x-text="sortAsc?'🔼':'🔽'"></span></th>
                                    <th class="px-3 py-3 font-semibold resizable-th cursor-pointer hover:bg-slate-700/50 select-none" @click="sortBy('Proveedor')">Proveedor <span x-show="sortCol==='Proveedor'" x-text="sortAsc?'🔼':'🔽'"></span></th>
                                    <th class="px-3 py-3 font-semibold resizable-th cursor-pointer hover:bg-slate-700/50 select-none" @click="sortBy('Fecha')">Fecha <span x-show="sortCol==='Fecha'" x-text="sortAsc?'🔼':'🔽'"></span></th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-700/40">
                                <template x-for="(row, idx) in groupedRows" :key="idx">
                                    <!-- Group Header Row -->
                                    <template x-if="row._isGroup">
                                        <tr class="group-header">
                                            <td colspan="8">
                                                <span x-text="row.label"></span>
                                                <span class="ml-2 text-slate-400 font-normal">(<span x-text="row.count"></span> artículos · $<span x-text="row.sum.toLocaleString('en-US',{minimumFractionDigits:2})"></span>)</span>
                                            </td>
                                        </tr>
                                    </template>
                                    <!-- Data Row -->
                                    <template x-if="!row._isGroup">
                                        <tr class="hover:bg-slate-700/30 transition-colors" :class="sessionAddedUUIDs.includes(row.UUID_Factura)?'bg-blue-900/10':''">
                                            <td class="px-3 py-1.5 font-mono font-bold text-accent" x-text="row.SKU||'-'"></td>
                                            <td class="px-3 py-1.5 truncate max-w-[180px]" :title="row.Producto" x-text="row.Producto"></td>
                                            <td class="px-3 py-1.5">
                                                <select x-model="row.Categoria" @change="markDirty(row)"
                                                    class="bg-slate-900 border rounded px-1.5 py-0.5 focus:outline-none focus:border-primary text-xs font-semibold w-36"
                                                    :class="row.Categoria&&row.Categoria!=='Sin Asignar'?'border-green-600 text-green-400':'border-red-700 text-red-400'">
                                                    <option>Sin Asignar</option>
                                                    <template x-for="cat in odooCategories" :key="cat"><option :value="cat" x-text="cat"></option></template>
                                                </select>
                                            </td>
                                            <td class="px-3 py-1.5 text-right" x-text="row.Cantidad"></td>
                                            <td class="px-3 py-1.5 text-right font-mono" x-text="'$'+(parseFloat(row.Costo_Unitario)||0).toFixed(2)"></td>
                                            <td class="px-3 py-1.5 text-right font-mono font-bold text-blue-300" x-text="'$'+(parseFloat(row.Subtotal_Total)||0).toFixed(2)"></td>
                                            <td class="px-3 py-1.5 text-slate-500 truncate max-w-[130px]" :title="row.Proveedor" x-text="row.Proveedor"></td>
                                            <td class="px-3 py-1.5 text-slate-500" x-text="row.Fecha"></td>
                                        </tr>
                                    </template>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- ===== TAB DASHBOARD ===== -->
            <div x-show="currentTab==='dashboard'" x-transition style="display:none" class="space-y-4">

                <!-- Dashboard Filters Bar -->
                <div class="glass rounded-xl border border-slate-700/50 p-3 flex flex-wrap items-center gap-3">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wide">Filtros Dashboard:</span>

                    <!-- Proveedor pill -->
                    <select x-model="dashProvFilter" @change="applyDashFilter('Proveedor',dashProvFilter)" class="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs focus:outline-none focus:border-accent">
                        <option value="">Todos los proveedores</option>
                        <template x-for="p in allProveedores" :key="p"><option :value="p" x-text="p"></option></template>
                    </select>

                    <!-- Categoria pill -->
                    <select x-model="dashCatFilter" @change="applyDashFilter('Categoría',dashCatFilter)" class="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs focus:outline-none focus:border-accent">
                        <option value="">Todas las categorías</option>
                        <template x-for="cat in odooCategories" :key="cat"><option :value="cat" x-text="cat"></option></template>
                    </select>

                    <!-- Mes pill -->
                    <select x-model="dashMesFilter" @change="applyDashFilter('Mes',dashMesFilter)" class="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs focus:outline-none focus:border-accent">
                        <option value="">Todos los meses</option>
                        <template x-for="m in allMeses" :key="m"><option :value="m" x-text="m"></option></template>
                    </select>

                    <!-- Active pill badge -->
                    <template x-if="dashFilter">
                        <div class="filter-pill">
                            <span x-text="dashFilter.type+': '+dashFilter.value"></span>
                            <button @click="clearDashFilter()" class="text-blue-300 hover:text-white ml-1">✕ Limpiar</button>
                        </div>
                    </template>
                </div>

                <!-- Charts -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div class="glass p-4 rounded-xl border border-slate-700/50">
                        <h3 class="text-sm font-bold text-center mb-3 text-slate-300">Gasto por Categoría <span class="text-slate-500 text-xs">(click para filtrar)</span></h3>
                        <div class="relative" style="height:220px"><canvas id="catChart"></canvas></div>
                    </div>
                    <div class="glass p-4 rounded-xl border border-slate-700/50">
                        <h3 class="text-sm font-bold text-center mb-3 text-slate-300">Gasto por Mes <span class="text-slate-500 text-xs">(click para filtrar)</span></h3>
                        <div class="relative" style="height:220px"><canvas id="monthChart"></canvas></div>
                    </div>
                    <div class="glass p-4 rounded-xl border border-slate-700/50">
                        <h3 class="text-sm font-bold text-center mb-3 text-slate-300">Top Proveedores <span class="text-slate-500 text-xs">(click para filtrar)</span></h3>
                        <div class="relative" style="height:220px"><canvas id="provChart"></canvas></div>
                    </div>
                </div>

                <!-- Summary Chips Panel -->
                <div class="glass rounded-xl border border-slate-700/50 p-4">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-bold text-white">📊 <span x-text="dashFilter ? dashFilter.type+': '+dashFilter.value : 'Consolidado General'"></span></h3>
                        <div class="flex gap-2 items-center">
                            <span class="text-sm text-slate-400">Total: <b class="text-green-400" x-text="'$'+flexTableSum.toLocaleString('en-US',{minimumFractionDigits:2})"></b></span>
                            <button @click="downloadFlexTable()" class="px-4 py-1.5 bg-accent hover:bg-yellow-500 text-slate-900 font-bold rounded text-xs shadow shadow-accent/40">📥 Descargar CSV</button>
                        </div>
                    </div>

                    <!-- Agrupar Flex Table -->
                    <div class="flex gap-2 mb-3 flex-wrap">
                        <span class="text-xs text-slate-500">Agrupar tabla por:</span>
                        <template x-for="g in ['Ninguno','Categoria','Proveedor','Fecha']" :key="g">
                            <button @click="dashGroupBy=g" class="chip" :class="dashGroupBy===g?'bg-accent text-slate-900':'chip-inactive'" x-text="g"></button>
                        </template>
                    </div>

                    <!-- Flex Table -->
                    <div class="overflow-y-auto custom-scrollbar rounded-lg" style="max-height:380px">
                        <table class="w-full text-xs text-left">
                            <thead class="sticky top-0 bg-slate-800/95 text-accent font-bold">
                                <tr>
                                    <th class="px-3 py-2 cursor-pointer hover:bg-slate-700/50" @click="sortFlexBy('Fecha')">Fecha <span x-show="flexSortCol==='Fecha'" x-text="flexSortAsc?'🔼':'🔽'"></span></th>
                                    <th class="px-3 py-2 cursor-pointer hover:bg-slate-700/50" @click="sortFlexBy('SKU')">SKU <span x-show="flexSortCol==='SKU'" x-text="flexSortAsc?'🔼':'🔽'"></span></th>
                                    <th class="px-3 py-2 cursor-pointer hover:bg-slate-700/50" @click="sortFlexBy('Producto')">Producto <span x-show="flexSortCol==='Producto'" x-text="flexSortAsc?'🔼':'🔽'"></span></th>
                                    <th class="px-3 py-2 cursor-pointer hover:bg-slate-700/50" @click="sortFlexBy('Categoria')">Categoría <span x-show="flexSortCol==='Categoria'" x-text="flexSortAsc?'🔼':'🔽'"></span></th>
                                    <th class="px-3 py-2 cursor-pointer hover:bg-slate-700/50" @click="sortFlexBy('Proveedor')">Proveedor <span x-show="flexSortCol==='Proveedor'" x-text="flexSortAsc?'🔼':'🔽'"></span></th>
                                    <th class="px-3 py-2 cursor-pointer hover:bg-slate-700/50 text-right" @click="sortFlexBy('Subtotal_Total')">Subtotal <span x-show="flexSortCol==='Subtotal_Total'" x-text="flexSortAsc?'🔼':'🔽'"></span></th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-700/40">
                                <template x-for="(row,idx) in groupedFlexRows" :key="idx">
                                    <template x-if="row._isGroup">
                                        <tr class="group-header"><td colspan="6"><span x-text="row.label"></span> <span class="text-slate-400 font-normal ml-2">(<span x-text="row.count"></span> · $<span x-text="row.sum.toLocaleString('en-US',{minimumFractionDigits:2})"></span>)</span></td></tr>
                                    </template>
                                    <template x-if="!row._isGroup">
                                        <tr class="hover:bg-slate-700/30 text-slate-300">
                                            <td class="px-3 py-1.5" x-text="row.Fecha"></td>
                                            <td class="px-3 py-1.5 font-mono text-slate-400" x-text="row.SKU"></td>
                                            <td class="px-3 py-1.5 truncate max-w-[200px]" x-text="row.Producto"></td>
                                            <td class="px-3 py-1.5 text-green-300" x-text="row.Categoria"></td>
                                            <td class="px-3 py-1.5 truncate max-w-[140px]" x-text="row.Proveedor"></td>
                                            <td class="px-3 py-1.5 text-right font-bold text-white" x-text="'$'+(parseFloat(row.Subtotal_Total)||0).toFixed(2)"></td>
                                        </tr>
                                    </template>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
        </template>
    </main>

    <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('procurementApp', () => ({
            // State
            user: null, items: [], sessionAddedUUIDs: [],
            searchQuery: '', filterCat: '', filterProv: '',
            groupBy: 'Ninguno',
            sortCol: 'Fecha', sortAsc: false,
            currentTab: 'procesamiento',
            dragOver: false, isSyncing: false, dirtyItems: new Set(),
            // Dashboard
            dashFilter: null, dashProvFilter: '', dashCatFilter: '', dashMesFilter: '',
            dashGroupBy: 'Ninguno', flexSortCol: 'Subtotal_Total', flexSortAsc: false,
            charts: {},
            // Odoo category map (SKU -> category)
            odooMap: {},
            // Derived
            odooCategories: [],

            // ---- COMPUTED ----
            get totalSpent() { return this.items.reduce((s,i)=>s+(parseFloat(i.Subtotal_Total)||0),0); },
            get uniqueInvoices() { return [...new Set(this.items.map(i=>i.UUID_Factura).filter(Boolean))]; },
            get sessionDates() {
                const dates = [...new Set(this.items.filter(i=>this.sessionAddedUUIDs.includes(i.UUID_Factura)).map(i=>i.Fecha))].filter(Boolean);
                return dates.length ? dates.join(' | ') : 'Todo sincronizado ✔️';
            },
            get allProveedores() { return [...new Set(this.items.map(i=>i.Proveedor).filter(Boolean))].sort(); },
            get allMeses() { return [...new Set(this.items.map(i=>(i.Fecha||'').substring(0,7)).filter(Boolean))].sort(); },

            // Filtered + sorted items (for main table)
            get filteredItems() {
                let r = this.items;
                const lq = this.searchQuery.toLowerCase();
                if(lq) r = r.filter(i=> [i.Producto,i.SKU,i.Categoria,i.Proveedor].some(v=>v&&String(v).toLowerCase().includes(lq)));
                if(this.filterCat === 'Sin Asignar') r = r.filter(i=>!i.Categoria||i.Categoria==='Sin Asignar');
                else if(this.filterCat === '_ok') r = r.filter(i=>i.Categoria&&i.Categoria!=='Sin Asignar');
                else if(this.filterCat) r = r.filter(i=>i.Categoria===this.filterCat);
                if(this.filterProv) r = r.filter(i=>i.Proveedor===this.filterProv);
                if(this.sortCol) {
                    const numCols = ['Cantidad','Costo_Unitario','Subtotal_Total'];
                    r = [...r].sort((a,b)=>{
                        let va=a[this.sortCol]||'', vb=b[this.sortCol]||'';
                        if(numCols.includes(this.sortCol)){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
                        else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}
                        return (va<vb?-1:va>vb?1:0)*(this.sortAsc?1:-1);
                    });
                }
                return r;
            },

            get displayedRowCount() { return this.filteredItems.length; },
            get filteredSubtotal() { return this.filteredItems.reduce((s,i)=>s+(parseFloat(i.Subtotal_Total)||0),0); },

            // Grouped rows for main table
            get groupedRows() {
                if(this.groupBy === 'Ninguno') return this.filteredItems;
                const key = this.groupBy;
                const groups = {};
                this.filteredItems.forEach(item => {
                    const gk = item[key] || '(Sin valor)';
                    if(!groups[gk]) groups[gk] = [];
                    groups[gk].push(item);
                });
                const rows = [];
                Object.keys(groups).sort().forEach(gk => {
                    const gItems = groups[gk];
                    const gSum = gItems.reduce((s,i)=>s+(parseFloat(i.Subtotal_Total)||0),0);
                    rows.push({_isGroup:true, label:gk, count:gItems.length, sum:gSum});
                    gItems.forEach(i=>rows.push(i));
                });
                return rows;
            },

            // Dashboard flex table
            get flexTableItems() {
                let r = this.items;
                if(this.dashFilter) {
                    if(this.dashFilter.type==='Categoría') r=r.filter(i=>i.Categoria===this.dashFilter.value);
                    else if(this.dashFilter.type==='Proveedor') r=r.filter(i=>i.Proveedor===this.dashFilter.value);
                    else if(this.dashFilter.type==='Mes') r=r.filter(i=>(i.Fecha||'').substring(0,7)===this.dashFilter.value);
                }
                const numCols=['Subtotal_Total'];
                const col = this.flexSortCol;
                return [...r].sort((a,b)=>{
                    let va=a[col]||'', vb=b[col]||'';
                    if(numCols.includes(col)){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
                    else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}
                    return (va<vb?-1:va>vb?1:0)*(this.flexSortAsc?1:-1);
                });
            },
            get flexTableSum() { return this.flexTableItems.reduce((s,i)=>s+(parseFloat(i.Subtotal_Total)||0),0); },
            get groupedFlexRows() {
                if(this.dashGroupBy==='Ninguno') return this.flexTableItems;
                const key = this.dashGroupBy;
                const groups = {};
                this.flexTableItems.forEach(item=>{
                    const gk=item[key]||'(Sin valor)';
                    if(!groups[gk]) groups[gk]=[];
                    groups[gk].push(item);
                });
                const rows=[];
                Object.keys(groups).sort().forEach(gk=>{
                    const gItems=groups[gk];
                    const gSum=gItems.reduce((s,i)=>s+(parseFloat(i.Subtotal_Total)||0),0);
                    rows.push({_isGroup:true,label:gk,count:gItems.length,sum:gSum});
                    gItems.forEach(i=>rows.push(i));
                });
                return rows;
            },

            // ---- INIT ----
            init() {
                // Load Odoo category map
                fetch('odoo_cats.json')
                    .then(r=>r.json())
                    .then(data=>{
                        this.odooMap = data;
                        const uniqueCats = [...new Set(Object.values(data))].filter(c=>c&&c!=='Sin Familia').sort();
                        this.odooCategories = uniqueCats;
                    })
                    .catch(()=>{ this.odooCategories=['Electricidad','Plomería','Herramienta Manual','Herramienta Eléctrica','Tornillería y Fijación','Cerrajería','Iluminación','Materiales Construcción','Seguridad']; });

                const timer = setInterval(()=>{
                    if(window.fbAuth){
                        clearInterval(timer);
                        window.fbAuth.onAuthStateChanged(window.fbAuth.auth, user=>{
                            this.user = user;
                            if(user) this.loadFromCloud();
                        });
                    }
                },50);
            },

            setTab(tab) {
                this.currentTab = tab;
                if(tab==='dashboard') setTimeout(()=>this.initCharts(),120);
            },

            async login() {
                try { await window.fbAuth.signInWithPopup(window.fbAuth.auth, new window.fbAuth.GoogleAuthProvider()); }
                catch(e){ console.error(e); }
            },
            async logout() { await window.fbAuth.signOut(window.fbAuth.auth); },

            async loadFromCloud() {
                const snap = await window.fbDb.getDocs(window.fbDb.collection(window.fbDb.db,'purchase_lines'));
                const loaded=[];
                snap.forEach(d=>loaded.push(d.data()));
                this.items = loaded;
            },

            sortBy(col) { this.sortCol===col ? this.sortAsc=!this.sortAsc : (this.sortCol=col, this.sortAsc=true); },
            sortFlexBy(col) { this.flexSortCol===col ? this.flexSortAsc=!this.flexSortAsc : (this.flexSortCol=col, this.flexSortAsc=false); },

            markDirty(item) { item.ModifiedBy=this.user.email; this.dirtyItems.add(item); },

            // --- FILE HANDLING ---
            async handleFileSelect(e) { await this.processFiles(e.target.files); },
            async handleDrop(e) { this.dragOver=false; await this.processFiles(e.dataTransfer.files); },

            async processFiles(fileList) {
                let n=0;
                for(const file of fileList){
                    if(file.name.toLowerCase().endsWith('.xml')){ await this.parseXML(file); n++; }
                    else if(file.name.toLowerCase().endsWith('.csv')){ await this.parseCSV(file); n++; }
                }
                if(n) alert(`¡${n} archivo(s) procesados!\n\nRevisa las categorías auto-asignadas (verde = OK, rojo = Sin Asignar).\nEn cuanto termines, dale a ☁️ Sincronizar.`);
            },

            getCategoryForSKU(sku) {
                // 1. Exact match vs Odoo master map
                if(sku && this.odooMap[sku]) return this.odooMap[sku];
                return null;
            },

            async parseXML(file) {
                const xml = new DOMParser().parseFromString(await file.text(),'text/xml');
                const emisorNode = xml.getElementsByTagName('cfdi:Emisor')[0]||xml.getElementsByTagName('Emisor')[0];
                const emisor = emisorNode ? emisorNode.getAttribute('Nombre')||'Desconocido' : 'Desconocido';
                const timbre = xml.getElementsByTagName('tfd:TimbreFiscalDigital')[0];
                const uuid = timbre?.getAttribute('UUID') || file.name.replace('.xml','');
                const comp = xml.getElementsByTagName('cfdi:Comprobante')[0]||xml.getElementsByTagName('Comprobante')[0];
                const fecha = comp?.getAttribute('Fecha')?.substring(0,10)||'Desconocida';
                let conceptos = [...xml.getElementsByTagName('cfdi:Concepto')];
                if(!conceptos.length) conceptos = [...xml.getElementsByTagName('Concepto')];
                const rows = conceptos.map(c=>{
                    const sku = c.getAttribute('NoIdentificacion')||'';
                    const prod = c.getAttribute('Descripcion');
                    // Priority: 1-Odoo master map by SKU, 2-Firebase history, 3-Sin Asignar
                    const odooCat  = this.getCategoryForSKU(sku);
                    const histCat  = this.items.find(i=>(i.SKU===sku&&sku)||(i.Producto===prod))?.Categoria;
                    const cat = odooCat || histCat || 'Sin Asignar';
                    return { Fecha:fecha, Proveedor:emisor, SKU:sku, Producto:prod,
                        Cantidad:parseFloat(c.getAttribute('Cantidad')),
                        Costo_Unitario:parseFloat(c.getAttribute('ValorUnitario')),
                        Subtotal_Total:parseFloat(c.getAttribute('Importe')),
                        UUID_Factura:uuid, Categoria:cat, ModifiedBy:this.user.email,
                        FB_ID:(uuid+'_'+prod.replace(/[^a-zA-Z0-9]/g,'')).substring(0,60) };
                });
                this.sessionAddedUUIDs.push(uuid);
                this.pushNewRows(rows);
            },

            parseCSV(file) {
                return new Promise(resolve=>{
                    Papa.parse(file,{ header:true, skipEmptyLines:true, complete:results=>{
                        const rows = results.data.map(row=>{
                            const sku = row.SKU||row.NoIdentificacion||'';
                            const odooCat = this.getCategoryForSKU(sku);
                            const histCat = this.items.find(i=>(i.SKU===sku&&sku)||(i.Producto===row.Producto))?.Categoria;
                            const cat = odooCat||(row.Categoria!=='Sin Asignar'?row.Categoria:null)||histCat||'Sin Asignar';
                            return {...row, SKU:sku, Categoria:cat, ModifiedBy:this.user.email,
                                FB_ID:((row.UUID_Factura||'noUUID')+'_'+row.Producto.replace(/[^a-zA-Z0-9]/g,'')).substring(0,60)};
                        });
                        if(rows[0]) this.sessionAddedUUIDs.push(rows[0].UUID_Factura);
                        this.pushNewRows(rows);
                        resolve();
                    }});
                });
            },

            pushNewRows(rows) {
                rows.forEach(nr=>{
                    if(this.items.findIndex(i=>i.FB_ID===nr.FB_ID)===-1){
                        this.items.unshift(nr);
                        this.dirtyItems.add(nr);
                    }
                });
            },

            async syncToCloud() {
                if(!this.dirtyItems.size) return alert('Todo ya está sincronizado ✔️');
                this.isSyncing=true;
                try {
                    const batch=window.fbDb.writeBatch(window.fbDb.db);
                    let n=0;
                    this.dirtyItems.forEach(item=>{
                        if(!item.FB_ID) item.FB_ID=(item.UUID_Factura+'_'+item.Producto.replace(/[^a-zA-Z0-9]/g,'')).substring(0,60);
                        batch.set(window.fbDb.doc(window.fbDb.db,'purchase_lines',item.FB_ID), Alpine.raw(item));
                        n++;
                    });
                    await batch.commit();
                    this.dirtyItems.clear();
                    this.sessionAddedUUIDs=[];
                    alert(`¡Sincronización exitosa! ${n} registros guardados en la nube.`);
                    if(this.currentTab==='dashboard') this.initCharts();
                } catch(e){ console.error(e); alert('Error al sincronizar. Ver consola.'); }
                this.isSyncing=false;
            },

            exportOdooPOs() {
                const target = this.sessionAddedUUIDs.length ? this.items.filter(i=>this.sessionAddedUUIDs.includes(i.UUID_Factura)) : this.items;
                const byInv={};
                target.forEach(i=>{ if(!byInv[i.UUID_Factura]) byInv[i.UUID_Factura]=[]; byInv[i.UUID_Factura].push({'default_code':i.SKU,'Nombre':i.Producto,'Cantidad':i.Cantidad,'Precio_Unitario':i.Costo_Unitario,'Categoria_Odoo':i.Categoria,'Proveedor':i.Proveedor}); });
                const uuids=Object.keys(byInv);
                if(!uuids.length) return alert('No hay datos para exportar.');
                uuids.forEach((uuid,idx)=>setTimeout(()=>{
                    const blob=new Blob([Papa.unparse(byInv[uuid])],{type:'text/csv;charset=utf-8;'});
                    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
                    a.download=`Odoo_PO_${byInv[uuid][0].Proveedor.replace(/[^a-zA-Z]/g,'_').substring(0,12)}_${uuid.substring(0,8)}.csv`;
                    a.click();
                },idx*500));
            },

            downloadFlexTable() {
                if(!this.flexTableItems.length) return;
                const data=this.flexTableItems.map(i=>({Fecha:i.Fecha,Proveedor:i.Proveedor,SKU:i.SKU,Producto:i.Producto,Categoria:i.Categoria,Cantidad:i.Cantidad,Costo_Unitario:i.Costo_Unitario,Subtotal_Total:i.Subtotal_Total}));
                const blob=new Blob([Papa.unparse(data)],{type:'text/csv;charset=utf-8;'});
                const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
                const safe=this.dashFilter?this.dashFilter.value.replace(/[^a-zA-Z0-9]/g,'_'):'General';
                a.download=`HerraMax_Reporte_${safe}.csv`; a.click();
            },

            applyDashFilter(type,value) { this.dashFilter = value ? {type,value} : null; this.initCharts(); },
            clearDashFilter() { this.dashFilter=null; this.dashProvFilter=''; this.dashCatFilter=''; this.dashMesFilter=''; this.initCharts(); },

            // ---- CHARTS ----
            initCharts() {
                const palette=['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#f43f5e','#84cc16','#fb923c','#a855f7'];
                // Cat
                const catAgg=this.agg('Categoria');
                this.mkChart('catChart','Categoría',catAgg,'doughnut',palette);
                // Month
                const mesAgg={}; this.items.forEach(i=>{ const m=(i.Fecha||'').substring(0,7); mesAgg[m]=(mesAgg[m]||0)+parseFloat(i.Subtotal_Total||0); });
                const sortedMes=Object.keys(mesAgg).sort().reduce((o,k)=>{o[k]=mesAgg[k];return o;},{});
                this.mkChart('monthChart','Mes',sortedMes,'bar',['#10b981']);
                // Prov
                const provAgg=this.agg('Proveedor');
                const topProv=Object.entries(provAgg).sort((a,b)=>b[1]-a[1]).slice(0,6).reduce((o,[k,v])=>{o[k]=v;return o;},{});
                this.mkChart('provChart','Proveedor',topProv,'bar',palette);
            },

            agg(field) { const m={}; this.items.forEach(i=>{ m[i[field]]=(m[i[field]]||0)+parseFloat(i.Subtotal_Total||0); }); return m; },

            mkChart(id,filterType,dataMap,type,colors) {
                const ctx=document.getElementById(id); if(!ctx) return;
                if(this.charts[id]) this.charts[id].destroy();
                this.charts[id]=new Chart(ctx.getContext('2d'),{
                    type,
                    data:{ labels:Object.keys(dataMap), datasets:[{ data:Object.values(dataMap), backgroundColor:type==='doughnut'?colors:colors[0], borderColor:type==='bar'?'transparent':undefined, tension:0.3 }] },
                    options:{
                        responsive:true, maintainAspectRatio:false,
                        plugins:{ legend:{ display:type==='doughnut', position:'bottom', labels:{color:'#cbd5e1',boxWidth:12,font:{size:10}} } },
                        scales:type!=='doughnut'?{ x:{ticks:{color:'#94a3b8',maxRotation:30,font:{size:9}}}, y:{ticks:{color:'#94a3b8'}} }:{},
                        onClick:(e,els)=>{ if(els.length){ const lbl=this.charts[id].data.labels[els[0].index]; this.applyDashFilter(filterType,lbl); } }
                    }
                });
            }
        }));
    });
    </script>
</body>
